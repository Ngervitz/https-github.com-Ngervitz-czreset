// =============================================================================
// MOTOR V2 — SCORE CONDUCTUAL (encuesta)
// =============================================================================
function calcularScoreEncuesta(resp) {
  if (!resp) return {score:50, nivel:"B", bPlus:false, bloques:{}, flagsRiesgo:[]};

  const v = k => p2n(resp["p"+k]);

  // Bloques
  const b1 = [v(1),v(2),v(7)].filter(x=>x!==null);
  const b2 = [v(4),v(6),v(10)].filter(x=>x!==null);
  const b3 = [v(3),v(9)].filter(x=>x!==null);
  const b4 = [v(5),v(8)].filter(x=>x!==null);

  const norm = (arr) => arr.length ? (arr.reduce((s,x)=>s+x,0) / (arr.length*3)) * 100 : 50;

  const n1=norm(b1), n2=norm(b2), n3=norm(b3), n4=norm(b4);
  const score = Math.round(n1*0.30 + n2*0.30 + n3*0.20 + n4*0.20);

  // Segmentacion base
  let nivel = score>=70?"A":score>=40?"B":"C";
  const baselineNivel = nivel;
  const flagsRiesgo = [];

  // Reglas duras — forzar C
  if (resp.p6==="D") { nivel="C"; flagsRiesgo.push("p6_D_prestamo_informal"); }
  if (resp.p8==="D") { nivel="C"; flagsRiesgo.push("p8_D_sin_accion"); }
  if (resp.p10==="D"){ nivel="C"; flagsRiesgo.push("p10_D_sin_constancia"); }

  // Degradar A -> B
  if (nivel==="A" && (resp.p3==="C"||resp.p3==="D")) { nivel="B"; flagsRiesgo.push("p3_baja_responsabilidad"); }
  if (nivel==="A" && resp.p5==="D")                  { nivel="B"; flagsRiesgo.push("p5_estres_extremo"); }
  if (nivel==="A" && resp.p7==="D")                  { nivel="B"; flagsRiesgo.push("p7_sin_claridad_deuda"); }

  // Flag B+
  const bPlus = nivel==="B" && resp.p8==="A"
    && (resp.p3==="A"||resp.p3==="B")
    && (resp.p10==="A"||resp.p10==="B");

  return {
    score,
    nivel: bPlus ? "B+" : nivel,
    nivelBase: nivel,
    baselineNivel,
    bPlus,
    flagsRiesgo,
    bloques: {b1:Math.round(n1), b2:Math.round(n2), b3:Math.round(n3), b4:Math.round(n4)},
  };
}

// =============================================================================
// MOTOR V2 — SCORE FINANCIERO
// =============================================================================
function calcularScoreFinanciero(ingreso, gastos, deudas) {
  const totalGastos     = Object.values(gastos).reduce((s,v)=>s+(parseFloat(v)||0),0);
  const totalDeuda      = deudas.reduce((s,d)=>s+(parseFloat(d.balance)||0),0);
  const pagoMinimoTotal = deudas.reduce((s,d)=>s+(parseFloat(d.minPayment)||0),0);
  const flujoLibre      = ingreso - totalGastos - pagoMinimoTotal;
  const ratio           = ingreso>0 ? pagoMinimoTotal/ingreso : 0;
  const cantDeudas      = deudas.length;
  const cantMoras       = deudas.filter(d=>d.status==="en_mora"||d.status==="atraso_grave").length;
  const cantInformales  = deudas.filter(d=>d.type==="Prestamo informal").length;

  let score = 100;

  // Ratio deuda/ingreso
  if      (ratio > 0.50) score -= 38;
  else if (ratio > 0.35) score -= 24;
  else if (ratio > 0.20) score -= 10;

  // Flujo libre
  if      (flujoLibre < 0)              score -= 32;
  else if (flujoLibre < ingreso*0.10)   score -= 14;

  // Moras (max -25)
  const descMoras = Math.min(cantMoras * 12, 25);
  score -= descMoras;

  // Prestamos informales
  if (cantInformales > 0) score -= 16;

  // Cantidad de deudas
  if (cantDeudas >= 5) score -= 10;

  // Gastos fijos
  if (totalGastos > ingreso*0.85) score -= 10;

  score = clamp(Math.round(score), 0, 100);

  return {
    totalGastos, totalDeuda, pagoMinimoTotal, flujoLibre,
    ratioDeudaIngreso: ratio,
    cantDeudas, cantMoras, cantInformales,
    scoreFinanciero: score,
  };
}

// =============================================================================
// MOTOR V2 — DIMENSIONES
// =============================================================================
function calcularDimensiones(resp, fin, ingreso) {
  const v = k => p2n(resp?.["p"+k]);
  const norm2 = (a,b) => { const vals=[v(a),v(b)].filter(x=>x!==null); return vals.length?Math.round(vals.reduce((s,x)=>s+x,0)/(vals.length*3)*100):50; };
  const norm1 = k => { const val=v(k); return val!==null?Math.round(val/3*100):50; };

  const organizacion     = norm2(1,7);
  const resiliencia      = norm1(2);
  const responsabilidad  = norm2(3,9);
  const accionReciente   = norm1(8);
  const conductaAutocontrol = (() => {
    const vals=[v(4),v(6),v(10)].filter(x=>x!==null);
    return vals.length?Math.round(vals.reduce((s,x)=>s+x,0)/(vals.length*3)*100):50;
  })();
  const estresFinanciero = (() => { const val=v(5); return val!==null?Math.round(val/3*100):50; })();
  const presionDeuda     = Math.round(clamp(fin.ratioDeudaIngreso*200, 0, 100));
  const liquidez         = fin.flujoLibre>ingreso*0.15?80:fin.flujoLibre>0?45:10;

  return {organizacion, resiliencia, responsabilidad, accionReciente, conductaAutocontrol, estresFinanciero, presionDeuda, liquidez};
}

    return mo!==0?mo:(parseFloat(b.balance)||0)-(parseFloat(a.balance)||0);

}

function asignarPlan(enc, fin, dim) {
  const r = PRE.respuestas;

  // 1. Condiciones criticas -> Plan 4
  const esCritico = enc.nivel==="C" || fin.flujoLibre < 0 || fin.cantInformales>0
    || (fin.cantMoras>=2 && fin.flujoLibre<fin.pagoMinimoTotal*0.3);
  if (esCritico) return 4;

  // 2. Presion alta de deuda -> Plan 2
  const presionAlta = fin.ratioDeudaIngreso>0.35 || fin.cantMoras>0 || fin.pagoMinimoTotal>fin.ingreso*0.35;
  if (presionAlta) return 2;

  // 3. Desorden financiero -> Plan 1
  const hayDesorden = dim.organizacion<50 || r.p7==="C"||r.p7==="D" || r.p1==="C"||r.p1==="D";
  if (hayDesorden) return 1;

  // 4. Buen perfil, ajustes menores -> Plan 3
  const buenPerfil = (enc.nivel==="A"||enc.nivel==="B+") && fin.ratioDeudaIngreso<0.35
    && fin.cantMoras===0 && fin.flujoLibre>0 && (r.p8==="A"||r.p8==="B");
  if (buenPerfil) return 3;

  // 5. Buena voluntad pero perfil deteriorado -> Plan 5
  const buenaVoluntad = (r.p3==="A"||r.p3==="B") && (r.p8==="A"||r.p8==="B") && (r.p9==="A"||r.p9==="B");
  if (buenaVoluntad) return 5;

  // Fallback
  return 1;
}

// =============================================================================
// CRONOGRAMA (metodo avalancha) — igual que antes
// =============================================================================
function generarCronograma(deudas, flujoExtra) {
  if (!deudas.length) return [];
  const pool = deudas.filter(d=>parseFloat(d.balance)>0)
    .map((d,i)=>({id:i, label:d.type+(d.bank?" ("+d.bank+")":""), saldo:parseFloat(d.balance)||0, minimo:parseFloat(d.minPayment)||0, status:d.status}))
    .sort((a,b)=>(MORA_ORDER[a.status]??3)-(MORA_ORDER[b.status]??3));
  const meses=[]; let estado=pool.map(d=>({...d})); let mes=0;
  while(estado.some(d=>d.saldo>0) && mes<60) {
    mes++; let extra=flujoExtra;
    estado.forEach(d=>{if(d.saldo>0)d.saldo=Math.max(0,d.saldo-d.minimo);});
    for(const d of estado){if(d.saldo>0&&extra>0){const p=Math.min(d.saldo,extra);d.saldo-=p;extra-=p;}}
    const snap={mes, deudas:estado.map(d=>({id:d.id,label:d.label,saldo:Math.round(d.saldo)}))};
    snap.totalSaldo=snap.deudas.reduce((s,d)=>s+d.saldo,0);
    meses.push(snap);
    estado.forEach(d=>{if(d.saldo===0&&d.minimo>0){flujoExtra+=d.minimo;d.minimo=0;}});
  }
  return meses;
}

// =============================================================================
// PERFIL CREDITICIO (tab existente — se mantiene igual)
// =============================================================================
function generarPerfilCrediticio(ratio, mora, score, flujoLibre, ingreso, deudas) {
  const f=[];
  const meses = (() => {
    if(score>=70&&mora.length===0&&flujoLibre>ingreso*0.2)return 0;
    let m=0;if(mora.length>0)m+=mora.length*3;if(ratio>0.5)m+=9;else if(ratio>0.3)m+=4;
    if(flujoLibre<0)m+=6;else if(flujoLibre<ingreso*0.2)m+=2;return Math.max(1,m);
  })();
  f.push({nombre:"Capacidad de pago",estado:ratio<0.3?"bien":ratio<0.5?"regular":"mal",descripcion:ratio<0.3?"Tu ratio deuda/ingreso esta dentro del rango aceptable para bancos (<30%).":ratio<0.5?"Tu ratio es alto. Los bancos prefieren menos del 30%.":"Tu ratio es critico. Ningun banco te aprobara hasta bajarlo.",accion:ratio>=0.3?"Objetivo: llevar el ratio a menos del 30% ("+fmt(ingreso*0.3)+"/mes en deuda).":null});
  f.push({nombre:"Historial de pagos",estado:mora.length===0?"bien":mora.length<=1?"regular":"mal",descripcion:mora.length===0?"Sin deudas en mora. Factor mas valorado por los buros.":mora.length===1?"1 deuda en mora. Regularizarla mejora el score en 3-6 meses.":mora.length+" deudas en mora. Cada una impacta el historial por hasta 5 anos.",accion:mora.length>0?"Regulariza las deudas en mora antes de cualquier solicitud nueva.":null});
  f.push({nombre:"Flujo disponible",estado:flujoLibre>ingreso*0.15?"bien":flujoLibre>0?"regular":"mal",descripcion:flujoLibre>ingreso*0.15?fmt(flujoLibre)+"/mes de margen libre — capacidad de afrontar una cuota nueva.":flujoLibre>0?"Flujo libre ajustado. Los bancos exigen al menos 20-25% de margen.":"Flujo negativo. No hay margen para ninguna cuota adicional.",accion:flujoLibre<=ingreso*0.15?"Necesitas al menos "+fmt(ingreso*0.2)+" de flujo libre para calificar.":null});
  f.push({nombre:"Cantidad de deudas",estado:deudas.length<=2?"bien":deudas.length<=4?"regular":"mal",descripcion:deudas.length<=2?"Pocas deudas activas. Perfil limpio.":deudas.length<=4?deudas.length+" deudas activas. Manejable pero senala dependencia del credito.":deudas.length+" deudas activas. Senal de alerta para analistas de riesgo.",accion:deudas.length>2?"Cancela al menos 1-2 deudas antes de solicitar un nuevo credito.":null});
  f.push({nombre:"Cuando podrias calificar",estado:meses<=3?"bien":meses<=9?"regular":"mal",descripcion:meses===0?"Con correcciones menores, podrias calificar en menos de 1 mes.":"Siguiendo el plan, estimamos que podrias calificar en aproximadamente "+meses+" meses.",accion:"Objetivo: mes "+meses+" — ratio <30%, sin moras, flujo libre >20%.",highlight:true});
  return f;
}

// MOTOR PRINCIPAL — genera el objeto completo del spec
// =============================================================================
function calcularMotorReset(ingreso, gastos, deudas) {
  const resp = PRE.respuestas;
  const enc  = calcularScoreEncuesta(resp);
  const fin  = calcularScoreFinanciero(ingreso, gastos, deudas);
  fin.ingreso = ingreso;
  const dim  = calcularDimensiones(resp, fin, ingreso);

  const scoreReset = calcularScoreReset(fin.scoreFinanciero, enc.score);
  let   nivelR     = nivelReset(scoreReset);

  const planId = asignarPlan(enc, fin, dim);
  const plan   = PLANES[planId];

  // Ajustar nivel Reset segun el plan
  if (planId===4) nivelR="C";
  if (planId===2 && nivelR==="A") nivelR="B";

  const deudaPrioritaria = calcularDeudaPrioritaria(deudas);
  const mora             = deudas.filter(d=>d.status==="en_mora"||d.status==="atraso_grave");
  const cronograma       = generarCronograma(deudas, fin.flujoLibre>0?fin.flujoLibre:0);
  const perfilFactores   = generarPerfilCrediticio(fin.ratioDeudaIngreso, mora, scoreReset, fin.flujoLibre, ingreso, deudas);

  // Alertas
  const alertas=[];
  if(fin.flujoLibre<0)          alertas.push("Flujo mensual negativo — emergencia financiera.");
  if(mora.length>0)             alertas.push(mora.length+" deuda(s) en mora — riesgo de inhibicion de fondos.");
  if(fin.ratioDeudaIngreso>0.5) alertas.push("Ratio deuda/ingreso critico — no calificaras para nuevos creditos.");
  if(fin.cantInformales>0)      alertas.push("Prestamos informales activos — costos ocultos elevados.");
  if(enc.flagsRiesgo.length>0)  alertas.push("Flags conductuales: "+enc.flagsRiesgo.join(", ")+".");

  // Acciones del plan (para compatibilidad con tabs existentes)
  const acciones = plan.prioridades.map((p,i) => ({
    titulo: p,
    detalle: "",
    tipo: i===0 ? (planId===4||planId===2?"danger":"warn") : "accent",
  }));

  const resultado = {
    user: {
      nombre:PRE.nombre, cedula:PRE.cedula, email:PRE.email, telefono:PRE.telefono,
      ingreso, laboral:PRE.situacionLaboral, monto_solicitado:PRE.montoSolicitado,
      motivo_rechazo:PRE.motivoRechazo, canal:PRE.canal,
    },
    encuesta: {
      respuestas:resp, score_encuesta_v2:enc.score, baseline_nivel:enc.baselineNivel,
      nivel_final:enc.nivel, b_plus:enc.bPlus, flags_riesgo:enc.flagsRiesgo, bloques:enc.bloques,
    },
    financiero: {
      total_gastos:fin.totalGastos, total_deuda:fin.totalDeuda,
      pago_minimo_total:fin.pagoMinimoTotal, flujo_libre:fin.flujoLibre,
      ratio_deuda_ingreso:fin.ratioDeudaIngreso, cantidad_deudas:fin.cantDeudas,
      cantidad_moras:fin.cantMoras, cantidad_prestamos_informales:fin.cantInformales,
      score_financiero:fin.scoreFinanciero,
    },
    dimensiones: dim,
    reset: {
      score_reset:scoreReset, nivel_reset:nivelR,
      plan_id:planId, plan_titulo:plan.titulo,
      problema_dominante:plan.problema, objetivo:plan.objetivo,
      prioridades:plan.prioridades, cta:plan.cta, reevaluacion:plan.reevaluacion,
    },
    prioridad_deuda: deudaPrioritaria ? {
      tipo:deudaPrioritaria.type, entidad:deudaPrioritaria.bank||"",
      saldo:parseFloat(deudaPrioritaria.balance)||0,
      pago_mensual:parseFloat(deudaPrioritaria.minPayment)||0,
      estado:deudaPrioritaria.status,
    } : null,
    // computed helpers para UI existente
    score:scoreReset, nivel:nivelR==="A"?"MANEJABLE":nivelR==="B"?"EN RIESGO":"CRITICO",
    flujoLibre:fin.flujoLibre, totalGastos:fin.totalGastos, totalSaldo:fin.totalDeuda,
    totalMin:fin.pagoMinimoTotal, ratio:fin.ratioDeudaIngreso,
    problema:plan.problema, prioritaria:deudaPrioritaria,
    acciones, alertas, cronograma, perfilFactores, mora,
    alDia:deudas.filter(d=>d.status==="al_dia"),
    plan, planId, scoreFinanciero:fin.scoreFinanciero, scoreEncuesta:enc.score,
    nivelEncuesta:enc.nivel, bPlus:enc.bPlus, dimensiones:dim,
  };

  resultado.prompt_ia = generarPromptIA(resultado);
  return resultado;
}

const RESET_API_URL   = "https://tu-backend.com/api/reset/guardar"; // TODO: reemplazar
const RESET_API_TOKEN = "reset-token-interno";                        // TODO: reemplazar

async function guardarEnCRM(motor, gastos, deudas, iaResultado) {
  const payload = {
    user: motor.user,
    encuesta: motor.encuesta,
    financiero: motor.financiero,
    dimensiones: motor.dimensiones,
    reset: motor.reset,
    prioridad_deuda: motor.prioridad_deuda,
    gastos_detalle: gastos,
    deudas_detalle: deudas.map(d => ({
      tipo: d.type, entidad: d.bank||"",
      saldo: parseFloat(d.balance)||0,
      pago_mensual: parseFloat(d.minPayment)||0,
      estado: d.status,
    })),
    ia_resultado: iaResultado || null,
    metadata: {
      algorithm_version: ALGORITHM_VERSION,
      timestamp: new Date().toISOString(),
      dia_recuperacion: 0,
    },
  };

  try {
    const res = await fetch(RESET_API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-Reset-Token": RESET_API_TOKEN,
      },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if (!data.ok) console.warn("[CRM] Error al guardar:", data.error);
    else {
      trackEvent("reset_plan_generated", { plan_id: motor.planId, score: motor.score, crm_id: data.crm_id });
      console.log("[CRM] Guardado correctamente. ID:", data.crm_id);
    }
  } catch(e) {
    // No bloquear el flujo del usuario si el CRM falla
    console.warn("[CRM] No se pudo conectar:", e.message);
  }
}

const ANTHROPIC_ENDPOINT = "https://api.anthropic.com/v1/messages";
// TODO produccion: const ANTHROPIC_ENDPOINT = "/api/ia-diagnostico";

async function llamarClaudeIA(motor, apiKey) {
  const u = motor.user;
  const fin = motor.financiero;
  const enc = motor.encuesta;
  const reset = motor.reset;
  const dim = motor.dimensiones;

  const userPrompt = `Actua como asesor financiero de Credizona Reset para Uruguay.
Tono: claro, humano, directo, sin juzgar. Espanol rioplatense.
No prometas aprobacion de credito ni sugieras nuevos prestamos.
El plan ya esta decidido por el algoritmo. Tu tarea es explicarlo y personalizarlo.

USUARIO: ${u.nombre} | Ingreso: $${u.ingreso.toLocaleString("es-UY")} | Laboral: ${u.laboral} | Motivo rechazo: ${u.motivo_rechazo}
RESET: Score ${reset.score_reset}/100 | Nivel ${reset.nivel_reset} | Plan: ${reset.plan_titulo}
ENCUESTA: Score ${enc.score_encuesta_v2}/100 | Nivel ${enc.nivel_final} | B+: ${enc.b_plus}
FINANCIERO: Gastos $${fin.total_gastos.toLocaleString("es-UY")} | Deuda $${fin.total_deuda.toLocaleString("es-UY")} | Flujo libre $${fin.flujo_libre.toLocaleString("es-UY")} | Ratio ${Math.round(fin.ratio_deuda_ingreso*100)}% | Moras: ${fin.cantidad_moras}
DIMENSIONES: Organizacion ${dim.organizacion} | Accion ${dim.accionReciente} | Conducta ${dim.conductaAutocontrol} | Estres ${dim.estresFinanciero} | Liquidez ${dim.liquidez}
PLAN ASIGNADO — ${reset.plan_titulo}:
- Objetivo: ${reset.objetivo}
- Prioridad 1: ${reset.prioridades[0]}
- Prioridad 2: ${reset.prioridades[1]}
- Prioridad 3: ${reset.prioridades[2]}
- Proximo paso: ${reset.cta}
- Reevaluacion: ${reset.reevaluacion}
${motor.prioridad_deuda ? "DEUDA PRIORITARIA: "+motor.prioridad_deuda.tipo+(motor.prioridad_deuda.entidad?" ("+motor.prioridad_deuda.entidad+")":"")+" — $"+motor.prioridad_deuda.saldo.toLocaleString("es-UY")+", estado: "+motor.prioridad_deuda.estado : ""}

Responde SOLO con JSON valido sin markdown:
{"diagnostico":"2-3 oraciones directas sobre la situacion principal.","plan":"Explicacion clara del plan y por que aplica a esta persona especificamente.","prioridades":["accion 1 concreta","accion 2 concreta","accion 3 concreta"],"primerPaso":"Una sola accion concreta para hacer esta semana.","mensaje":"Frase motivadora y realista. Directa. Sin exclamaciones vacias."}`;

  // Headers para browser directo. En backend omitir anthropic-dangerous-direct-browser-access.
  const headers = {
    "Content-Type": "application/json",
    "x-api-key": apiKey,
    "anthropic-version": "2023-06-01",
    "anthropic-dangerous-direct-browser-access": "true",
  };

  const res = await fetch(ANTHROPIC_ENDPOINT, {
    method: "POST",
    headers,
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 600,
      messages: [{ role: "user", content: userPrompt }],
    }),
  });

  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.error?.message || "Error de API: " + res.status);
  }

  const data = await res.json();
  const raw = data.content?.[0]?.text || "{}";
  return JSON.parse(raw.replace(/```json|```/g, "").trim());
}

function Card({children, style={}}) {
  return <div style={{background:C.card, border:"1px solid "+C.border, borderRadius:14, ...style}}>{children}</div>;
}

function Tag({color, children}) {
  return <span style={{background:color+"18", border:"1px solid "+color+"40", color, borderRadius:5, padding:"2px 8px", fontSize:9, fontWeight:800, letterSpacing:"0.08em", fontFamily:"'Syne',sans-serif", textTransform:"uppercase"}}>{children}</span>;
}

function ProgressBar({pct, color}) {
  color = color||C.accent;
  return <div style={{height:6, background:C.border, borderRadius:3, overflow:"hidden"}}>
    <div style={{height:"100%", width:clamp(pct,0,100)+"%", background:color, borderRadius:3, transition:"width 0.5s ease"}}/>
  </div>;
}

function ReadOnly({label, value}) {
  return <div style={{marginBottom:14}}>
    <div style={{fontSize:10, color:C.muted, letterSpacing:"0.06em", textTransform:"uppercase", fontFamily:"'Syne',sans-serif", marginBottom:4}}>{label}</div>
    <div style={{background:C.surface, border:"1px solid "+C.border, borderRadius:9, padding:"10px 13px", color:C.subtle, fontSize:14}}>{value}</div>
  </div>;
}

function Field({label, value, onChange, type, prefix, placeholder}) {
  type = type||"text";
  const [f,setF]=useState(false);
  return <div style={{marginBottom:16}}>
    <div style={{fontSize:10, color:C.subtle, letterSpacing:"0.06em", textTransform:"uppercase", fontFamily:"'Syne',sans-serif", marginBottom:5}}>{label}</div>
    <div style={{position:"relative"}}>
      {prefix&&<span style={{position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", color:C.accent, fontSize:13, fontWeight:700}}>{prefix}</span>}
      <input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
        onFocus={()=>setF(true)} onBlur={()=>setF(false)}
        style={{width:"100%", boxSizing:"border-box", background:C.surface, border:"1.5px solid "+(f?C.accent:C.border), borderRadius:9, padding:prefix?"11px 13px 11px 27px":"11px 13px", color:C.text, fontSize:14, outline:"none", transition:"border 0.2s"}}/>
    </div>
  </div>;
}

function Sel({label, value, onChange, options}) {
  const [f,setF]=useState(false);
  return <div style={{marginBottom:16}}>
    <div style={{fontSize:10, color:C.subtle, letterSpacing:"0.06em", textTransform:"uppercase", fontFamily:"'Syne',sans-serif", marginBottom:5}}>{label}</div>
    <select value={value} onChange={e=>onChange(e.target.value)} onFocus={()=>setF(true)} onBlur={()=>setF(false)}

      {options.map(o=><option key={o.v} value={o.v} style={{background:C.card}}>{o.l}</option>)}
    </select>
  </div>;
}

    <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12}}>

  </Card>;
}

function ScoreMeter({score, color}) {
  color = color||C.accent;
  const [val,setVal]=useState(0);
  useEffect(()=>{
    let v=0; const step=score/50;
    const t=setInterval(()=>{v+=step;if(v>=score){setVal(score);clearInterval(t);}else setVal(Math.round(v));},16);
    return()=>clearInterval(t);
  },[score]);
  const r=52, circ=2*Math.PI*r, dash=(clamp(val,0,100)/100)*circ;
  return <div style={{display:"flex", flexDirection:"column", alignItems:"center"}}>
    <svg width="130" height="130" viewBox="0 0 130 130">
      <circle cx="65" cy="65" r={r} fill="none" stroke={C.border} strokeWidth="12"/>
      <circle cx="65" cy="65" r={r} fill="none" stroke={color} strokeWidth="12"
        strokeDasharray={dash+" "+circ} strokeLinecap="round"
        transform="rotate(-90 65 65)" style={{transition:"stroke-dasharray 0.04s linear"}}/>
      <text x="65" y="60" textAnchor="middle" fill={color} fontSize="28" fontWeight="900" fontFamily="'DM Serif Display',serif">{val}</text>
      <text x="65" y="78" textAnchor="middle" fill={C.muted} fontSize="11" fontFamily="'Syne',sans-serif">/100</text>
    </svg>
  </div>;
}

function Tabs({tabs, active, onChange}) {
  return <div style={{display:"flex", gap:4, overflowX:"auto", paddingBottom:4}}>
    {tabs.map(t=>(
      <button key={t.id} onClick={()=>onChange(t.id)} style={{padding:"8px 14px", borderRadius:8, fontSize:11, fontWeight:700, fontFamily:"'Syne',sans-serif", cursor:"pointer", whiteSpace:"nowrap", border:"1.5px solid "+(active===t.id?C.accent:C.border), background:active===t.id?C.aD:"transparent", color:active===t.id?C.accent:C.muted, transition:"all 0.2s"}}>
        {t.icon} {t.label}
      </button>
    ))}
  </div>;
}

        <div style={{fontSize:13, fontWeight:700, color:C.accent, fontFamily:"'Syne',sans-serif", marginTop:4}}>{plan.reevaluacion}</div>
      </Card>
    </div>

    {/* Metricas financieras */}
    <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:14}}>
      {[
        {l:"Flujo libre/mes", v:fmt(diag.flujoLibre), c:diag.flujoLibre<0?C.danger:C.accent},
        {l:"Deuda total",     v:fmt(diag.totalSaldo),  c:C.warn},
        {l:"Ratio deuda/ing", v:fmtPct(diag.ratio),    c:diag.ratio>0.5?C.danger:diag.ratio>0.35?C.warn:C.accent},
        {l:"Pagos minimos",   v:fmt(diag.totalMin),    c:C.subtle},
      ].map(m=>(
        <Card key={m.l} style={{padding:"12px 14px"}}>
          <div style={{fontSize:10, color:C.muted, fontFamily:"'Syne',sans-serif", marginBottom:5}}>{m.l}</div>
          <div style={{fontSize:18, fontWeight:700, color:m.c, fontFamily:"'DM Serif Display',serif"}}>{m.v}</div>
        </Card>
      ))}
    </div>

    {/* Prioridades */}
    <div style={{marginBottom:14}}>
      <div style={{fontSize:10, color:C.muted, fontFamily:"'Syne',sans-serif", textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:10}}>Prioridades del plan</div>
      {plan.prioridades.map((p,i)=>(
        <Card key={i} style={{padding:"14px 16px", marginBottom:8, borderLeft:"3px solid "+planColor}}>
          <div style={{display:"flex", gap:10, alignItems:"flex-start"}}>
            <div style={{width:22, height:22, borderRadius:"50%", background:planColor+"20", border:"1.5px solid "+planColor+"60", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:900, color:planColor, flexShrink:0}}>{i+1}</div>
            <p style={{fontSize:13, color:C.subtle, lineHeight:1.6}}>{p}</p>
          </div>
        </Card>
      ))}
    </div>

    {/* Deuda prioritaria */}
    {diag.prioridad_deuda&&<Card style={{padding:"16px 18px", marginBottom:14, border:"1px solid "+C.dB, background:C.dD}}>
      <div style={{fontSize:10, color:C.danger, fontWeight:800, textTransform:"uppercase", letterSpacing:"0.08em", fontFamily:"'Syne',sans-serif", marginBottom:10}}>Deuda prioritaria</div>
      <div style={{fontSize:15, fontWeight:700, color:C.text, fontFamily:"'DM Serif Display',serif", marginBottom:6}}>
        {diag.prioridad_deuda.tipo}{diag.prioridad_deuda.entidad?" — "+diag.prioridad_deuda.entidad:""}
      </div>
      <div style={{display:"flex", gap:16, flexWrap:"wrap"}}>
        <div><div style={{fontSize:10, color:C.muted}}>Saldo</div><div style={{fontSize:15, fontWeight:700, color:C.danger, fontFamily:"'DM Serif Display',serif"}}>{fmt(diag.prioridad_deuda.saldo)}</div></div>
        <div><div style={{fontSize:10, color:C.muted}}>Pago min.</div><div style={{fontSize:15, fontWeight:700, color:C.warn, fontFamily:"'DM Serif Display',serif"}}>{fmt(diag.prioridad_deuda.pago_mensual)}/mes</div></div>
        <div><div style={{fontSize:10, color:C.muted}}>Estado</div><div style={{fontSize:12, fontWeight:700, color:C.danger}}>{diag.prioridad_deuda.estado==="en_mora"?"En mora":diag.prioridad_deuda.estado==="atraso_grave"?"Atraso grave":diag.prioridad_deuda.estado==="atraso_leve"?"Atraso leve":"Al dia"}</div></div>
      </div>
    </Card>}

    {/* Alertas */}
    {diag.alertas.length>0&&<Card style={{padding:"14px 16px", marginBottom:14, border:"1px solid "+C.dB, background:C.dD}}>
      <div style={{fontSize:10, color:C.danger, fontWeight:800, textTransform:"uppercase", letterSpacing:"0.08em", fontFamily:"'Syne',sans-serif", marginBottom:8}}>Alertas activas</div>
      {diag.alertas.map((a,i)=><p key={i} style={{fontSize:12, color:C.subtle, marginBottom:i<diag.alertas.length-1?5:0, lineHeight:1.5}}>x {a}</p>)}
    </Card>}

    {/* CTA */}
    <div style={{background:planDim, border:"1px solid "+planColor+"30", borderRadius:12, padding:"18px 20px", textAlign:"center"}}>
      <p style={{fontSize:13, color:C.subtle, marginBottom:14}}>{plan.cta}</p>
      <button onClick={()=>onGoToTab("ia")} style={{background:"linear-gradient(135deg,"+planColor+","+planColor+"CC)", border:"none", borderRadius:10, padding:"12px 26px", fontSize:13, fontWeight:800, color:"#0A0C11", cursor:"pointer", fontFamily:"'Syne',sans-serif"}}>
        Ver analisis IA personalizado
      </button>
    </div>
  </div>;
}

function TabIA({diag, iaResult, iaLoading, iaError, onGenerar}) {

      <div style={{display:"flex", gap:8, justifyContent:"center", flexWrap:"wrap", marginBottom:20}}>

  // Error

      <div style={{fontSize:13, fontWeight:700, color:C.danger, marginBottom:6}}>No se pudo generar el analisis</div>

    </button>

  // Resultado
  return <div className="fade">
    <Card style={{padding:"20px 22px", marginBottom:14, border:"1px solid "+C.aB, background:C.aD}}>
      <div style={{fontSize:10, color:C.accent, fontWeight:800, textTransform:"uppercase", letterSpacing:"0.07em", fontFamily:"'Syne',sans-serif", marginBottom:8}}>

      </div>
      <p style={{fontSize:15, color:C.text, lineHeight:1.75, fontStyle:"italic"}}>"{iaResult.mensaje}"</p>
    </Card>

    {[
      {icon:"🔍", title:"Diagnostico",        text:iaResult.diagnostico},
      {icon:"🎯", title:"Por que este plan",   text:iaResult.plan},
    ].map(s=>(
      <Card key={s.title} style={{padding:"18px 20px", marginBottom:12}}>
        <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:10}}>
          <span style={{fontSize:16}}>{s.icon}</span>
          <span style={{fontSize:13, fontWeight:700, color:C.text, fontFamily:"'Syne',sans-serif"}}>{s.title}</span>
        </div>
        <p style={{fontSize:13, color:C.subtle, lineHeight:1.7}}>{s.text}</p>

    {iaResult.prioridades && iaResult.prioridades.length > 0 && (
      <Card style={{padding:"18px 20px", marginBottom:12}}>
        <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:12}}>
          <span style={{fontSize:16}}>📋</span>
          <span style={{fontSize:13, fontWeight:700, color:C.text, fontFamily:"'Syne',sans-serif"}}>Acciones recomendadas</span>

        {iaResult.prioridades.map((p,i)=>(
          <div key={i} style={{display:"flex", gap:10, padding:"8px 0", borderBottom:i<iaResult.prioridades.length-1?"1px solid "+C.border:undefined}}>
            <div style={{width:22, height:22, borderRadius:"50%", background:C.aD, border:"1.5px solid "+C.aB, display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:800, color:C.accent, flexShrink:0}}>{i+1}</div>
            <p style={{fontSize:13, color:C.subtle, lineHeight:1.6}}>{p}</p>
          </div>
        ))}
      </Card>
    )}

    <Card style={{padding:"18px 20px", border:"1px solid "+C.aB, background:C.aD}}>
      <div style={{fontSize:10, color:C.accent, fontWeight:800, textTransform:"uppercase", letterSpacing:"0.07em", fontFamily:"'Syne',sans-serif", marginBottom:8}}>
        Hace esto esta semana
      </div>
      <p style={{fontSize:14, color:C.text, lineHeight:1.65, fontWeight:500}}>{iaResult.primerPaso}</p>
    </Card>

    <div style={{textAlign:"right", marginTop:10}}>
      <button onClick={onGenerar} style={{background:"none", border:"none", fontSize:11, color:C.muted, cursor:"pointer", fontFamily:"'Syne',sans-serif"}}>
        Regenerar analisis
      </button>
    </div>
  </div>;
}

// TAB: MIS DEUDAS (del backup, mantenido)
// =============================================================================
function TabDeudas({deudas, onChange, diag}) {
  const total = deudas.reduce((s,d)=>s+(parseFloat(d.balance)||0),0);
  const canceladas = deudas.filter(d=>parseFloat(d.balance)===0||d.cancelada);
  const marcar = i => onChange(deudas.map((d,idx)=>idx===i?{...d,balance:"0",cancelada:true,status:"al_dia"}:d));
  const editar = (i,val) => onChange(deudas.map((d,idx)=>idx===i?{...d,balance:val,cancelada:false}:d));
  return <div className="fade">
    <p style={{fontSize:13, color:C.muted, marginBottom:16, lineHeight:1.65}}>Actualiza tus saldos a medida que vas pagando. El score y el cronograma se recalculan automaticamente.</p>
    <div style={{display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:10, marginBottom:20}}>
      <Card style={{padding:"14px", textAlign:"center"}}><div style={{fontSize:10, color:C.muted, fontFamily:"'Syne',sans-serif", textTransform:"uppercase", marginBottom:6}}>Deuda total</div><div style={{fontSize:19, fontWeight:700, color:C.danger, fontFamily:"'DM Serif Display',serif"}}>{fmt(total)}</div></Card>
      <Card style={{padding:"14px", textAlign:"center"}}><div style={{fontSize:10, color:C.muted, fontFamily:"'Syne',sans-serif", textTransform:"uppercase", marginBottom:6}}>Canceladas</div><div style={{fontSize:19, fontWeight:700, color:C.accent, fontFamily:"'DM Serif Display',serif"}}>{canceladas.length}/{deudas.length}</div></Card>
      <Card style={{padding:"14px", textAlign:"center"}}><div style={{fontSize:10, color:C.muted, fontFamily:"'Syne',sans-serif", textTransform:"uppercase", marginBottom:6}}>Score</div><div style={{fontSize:19, fontWeight:700, fontFamily:"'DM Serif Display',serif", color:C.accent}}>{diag.score}/100</div></Card>
    </div>
    {deudas.map((d,i)=>{
      const saldo=parseFloat(d.balance)||0;
      const canc=saldo===0||d.cancelada;
      const sc=d.status==="en_mora"||d.status==="atraso_grave"?C.danger:d.status==="atraso_leve"?C.warn:C.accent;
      return <Card key={i} style={{padding:"16px 18px", marginBottom:12, opacity:canc?0.7:1, border:"1px solid "+(canc?C.aB:C.border), transition:"opacity 0.3s"}}>
        <div style={{display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:canc?0:14}}>
          <div style={{flex:1}}>
            <div style={{display:"flex", alignItems:"center", gap:8, marginBottom:4}}>
              {canc&&<span>checkmark</span>}
              <span style={{fontSize:14, fontWeight:700, color:canc?C.accent:C.text, fontFamily:"'DM Serif Display',serif"}}>{d.type}{d.bank?" - "+d.bank:""}</span>
            </div>
            {!canc&&<div style={{fontSize:11, color:sc, fontFamily:"'Syne',sans-serif", fontWeight:600}}>{d.status==="en_mora"?"En mora":d.status==="atraso_grave"?"Atraso grave":d.status==="atraso_leve"?"Atraso leve":"Al dia"} - min. {fmt(parseFloat(d.minPayment)||0)}/mes</div>}
            {canc&&<div style={{fontSize:11, color:C.accent, fontFamily:"'Syne',sans-serif", fontWeight:600}}>Cancelada - bien hecho!</div>}
          </div>
          {!canc&&<button onClick={()=>marcar(i)}
            style={{background:C.aD, border:"1px solid "+C.aB, borderRadius:8, padding:"6px 14px", fontSize:11, fontWeight:700, color:C.accent, cursor:"pointer", fontFamily:"'Syne',sans-serif", flexShrink:0, transition:"all 0.2s"}}
            onMouseEnter={e=>{e.currentTarget.style.background=C.accent;e.currentTarget.style.color="#0A0C11";}}
            onMouseLeave={e=>{e.currentTarget.style.background=C.aD;e.currentTarget.style.color=C.accent;}}>
            Cancelar
          </button>}
        </div>
        {!canc&&<div>
          <div style={{fontSize:10, color:C.muted, fontFamily:"'Syne',sans-serif", textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:6}}>Saldo actual</div>
          <div style={{position:"relative"}}>
            <span style={{position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", color:C.accent, fontWeight:700, fontSize:13}}>$</span>
            <input type="number" value={d.balance||""} onChange={e=>editar(i,e.target.value)}
              style={{width:"100%", boxSizing:"border-box", background:C.surface, border:"1.5px solid "+C.border, borderRadius:9, padding:"10px 13px 10px 27px", fontSize:14, color:C.text, outline:"none", transition:"border 0.2s"}}
              onFocus={e=>e.target.style.borderColor=C.accent} onBlur={e=>e.target.style.borderColor=C.border}/>
          </div>
        </div>}
      </Card>;
    })}
    <p style={{fontSize:11, color:C.muted, textAlign:"center", marginTop:8}}>Los cambios se guardan automaticamente.</p>
  </div>;
}

// =============================================================================
// TAB: CRONOGRAMA (del backup, mantenido)
// =============================================================================
function TabCronograma({cronograma, deudas, flujoLibre}) {
  const [extra,setExtra]=useState(0);
  const [crono,setCrono]=useState(cronograma);
  useEffect(()=>{setCrono(generarCronograma(deudas,Math.max(0,flujoLibre)+(parseFloat(extra)||0)));}, [extra,deudas,flujoLibre]);
  if(!crono.length)return <p style={{fontSize:13, color:C.muted}}>Con flujo libre negativo no es posible proyectar. Primero reduce tus gastos.</p>;
  const totalInicial=deudas.reduce((s,d)=>s+(parseFloat(d.balance)||0),0);
  return <div className="fade">
    <p style={{fontSize:13, color:C.muted, marginBottom:16, lineHeight:1.65}}>Proyeccion mes a mes con metodo avalancha. Cada deuda cancelada libera su cuota para la siguiente.</p>
    <Card style={{padding:"14px 16px", marginBottom:16, display:"flex", alignItems:"center", gap:14, flexWrap:"wrap"}}>
      <span style={{fontSize:12, color:C.muted}}>Extra mensual?</span>
      <div style={{display:"flex", alignItems:"center", gap:6}}>
        <span style={{color:C.accent, fontWeight:700}}>$</span>
        <input type="number" value={extra} onChange={e=>setExtra(e.target.value)} placeholder="0"
          style={{width:110, background:C.surface, border:"1.5px solid "+C.border, borderRadius:8, padding:"7px 10px", fontSize:13, color:C.text, outline:"none"}}/>
      </div>
      <span style={{fontSize:12, color:C.accent, fontWeight:600}}>{crono.length>=60?"+60 meses":crono.length+" meses"} para cancelar todo</span>
    </Card>
    <div style={{display:"flex", alignItems:"flex-end", gap:2, height:64, marginBottom:16}}>
      {crono.filter((_,i)=>i%Math.max(1,Math.floor(crono.length/20))===0||i===crono.length-1).map((m,i,arr)=>{
        const pct=totalInicial>0?m.totalSaldo/totalInicial:0;
        const color=pct>0.6?C.danger:pct>0.3?C.warn:C.accent;
        return <div key={m.mes} style={{flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:2}}>
          <div style={{width:"100%", height:Math.max(2,pct*60), background:color, borderRadius:"2px 2px 0 0", opacity:0.85}}/>
          {(i===0||i===Math.floor(arr.length/2)||i===arr.length-1)&&<span style={{fontSize:7, color:C.muted}}>M{m.mes}</span>}
        </div>;
      })}
    </div>
    {[1,3,6,12,24,36].filter(m=>m<=crono.length).map(mesN=>{
      const snap=crono[mesN-1]; if(!snap)return null;
      const pct=totalInicial>0?((totalInicial-snap.totalSaldo)/totalInicial*100):100;
      return <Card key={mesN} style={{padding:"10px 14px", marginBottom:8, display:"flex", alignItems:"center", gap:12}}>
        <span style={{fontSize:11, color:C.accent, fontWeight:700, fontFamily:"'Syne',sans-serif", width:52, flexShrink:0}}>Mes {mesN}</span>
        <div style={{flex:1}}><ProgressBar pct={pct} color={pct>70?C.accent:pct>40?C.warn:C.danger}/></div>
        <span style={{fontSize:13, fontWeight:700, fontFamily:"'DM Serif Display',serif", color:snap.totalSaldo===0?C.accent:C.text, minWidth:90, textAlign:"right"}}>{snap.totalSaldo===0?"Cancelado":fmt(snap.totalSaldo)}</span>
        <span style={{fontSize:10, color:C.muted, width:32, textAlign:"right"}}>{Math.round(pct)}%</span>
      </Card>;
    })}
  </div>;
}

// =============================================================================
// TAB: SIMULADOR (del backup, mantenido)
// =============================================================================
function TabSimulador({diag, ingreso}) {
  const [gE,setGE]=useState(0);
  const [pE,setPE]=useState(0);
  const [iE,setIE]=useState(0);
  const nf=diag.flujoLibre-(parseFloat(gE)||0)+(parseFloat(iE)||0)-(parseFloat(pE)||0);
  const nr=ingreso>0?(diag.totalMin+(parseFloat(pE)||0))/ingreso:0;
  let ns=100;
  if(nr>0.5)ns-=38;else if(nr>0.35)ns-=24;else if(nr>0.2)ns-=10;
  if(nf<0)ns-=32;else if(nf<ingreso*0.1)ns-=14;
  if(diag.mora.length>0)ns-=20;
  ns=clamp(Math.round(ns),0,100);
  const delta=ns-diag.score;
  return <div className="fade">
    <p style={{fontSize:13, color:C.muted, marginBottom:20, lineHeight:1.65}}>Modifica los valores para ver como cambia tu situacion en tiempo real.</p>
    <div style={{display:"flex", gap:8, flexWrap:"wrap", marginBottom:20}}>
      {[{l:"Libero $5k",g:5000,p:0,i:0},{l:"Pago extra $10k",g:0,p:10000,i:0},{l:"Ingreso +10%",g:0,p:0,i:Math.round(ingreso*0.1)},{l:"Todo junto",g:5000,p:10000,i:Math.round(ingreso*0.05)}].map(s=>(
        <button key={s.l} onClick={()=>{setGE(s.g);setPE(s.p);setIE(s.i);}}
          style={{padding:"7px 14px", borderRadius:20, fontSize:11, cursor:"pointer", border:"1.5px solid "+C.border, background:"transparent", color:C.muted, fontFamily:"'Syne',sans-serif", fontWeight:600, transition:"all 0.2s"}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=C.accent;e.currentTarget.style.color=C.accent;}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.muted;}}>
          {s.l}
        </button>
      ))}
    </div>
    <Card style={{padding:"18px 18px 4px", marginBottom:16}}>
      {[{l:"Reduccion de gastos",v:gE,s:setGE,c:C.accent},{l:"Pago extra a deudas",v:pE,s:setPE,c:C.warn},{l:"Ingreso adicional",v:iE,s:setIE,c:C.blue}].map(row=>(
        <div key={row.l} style={{marginBottom:18}}>
          <div style={{display:"flex", justifyContent:"space-between", marginBottom:6}}>
            <span style={{fontSize:11, color:C.subtle}}>{row.l}</span>
            <span style={{fontSize:12, color:row.c, fontWeight:700}}>{fmt(parseFloat(row.v)||0)}</span>
          </div>
          <input type="range" min="0" max={ingreso} step="500" value={row.v} onChange={e=>row.s(e.target.value)} style={{width:"100%", accentColor:row.c, cursor:"pointer"}}/>
        </div>
      ))}
    </Card>
    <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10}}>
      {[
        {l:"Nuevo flujo libre",a:fmt(nf),b:nf>diag.flujoLibre},
        {l:"Nuevo ratio deuda",a:fmtPct(nr),b:nr<diag.ratio},
        {l:"Score estimado",a:ns+"/100",b:delta>=0,d:delta},
        {l:"Mejora de flujo",a:fmt(nf-diag.flujoLibre),b:nf>=diag.flujoLibre,h:true},
      ].map(row=>(
        <Card key={row.l} style={{padding:"14px"}}>
          <div style={{fontSize:10, color:C.muted, fontFamily:"'Syne',sans-serif", marginBottom:8}}>{row.l}</div>
          <div style={{display:"flex", alignItems:"center", gap:8}}>
            <span style={{fontSize:17, fontWeight:700, fontFamily:"'DM Serif Display',serif", color:row.b?C.accent:C.danger}}>{row.a}</span>
            {row.d!==undefined&&row.d!==0&&<span style={{fontSize:11, fontWeight:700, color:row.d>0?C.accent:C.danger}}>{row.d>0?"+":""}{row.d}</span>}
          </div>
        </Card>
      ))}
    </div>
  </div>;
}

          <div style={{width:24, height:24, borderRadius:"50%", background:col+"20", border:"1.5px solid "+col+"60", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:800, color:col, flexShrink:0}}>
            {f.estado==="bien"?"v":f.estado==="regular"?"~":"x"}

            {f.estado==="bien"?"OK":f.estado==="regular"?"MEJORABLE":"CRITICO"}

        onFocus={e=>e.target.style.borderColor=L.accent} onBlur={e=>e.target.style.borderColor=L.border}>
        <option value="">Selecciona...</option>

// =============================================================================
// APP
// =============================================================================
function App() {
  const sesion = cargar();
  const [step,        setStep]        = useState(sesion ? 2 : 0);
  const [gastos,      setGastos]      = useState(sesion?.gastos  || {});
  const [deudas,      setDeudas]      = useState(sesion?.deudas  || [{type:"",balance:"",minPayment:"",status:"",bank:""}]);
  const [diag,        setDiag]        = useState(sesion?.diag    || null);
  const [saldoInicial,setSaldoInicial]= useState(sesion?.saldoInicial || 0);
  const [activeTab,   setActiveTab]   = useState("plan");
  const [errors,      setErrors]      = useState({});
  const [showReset,   setShowReset]   = useState(false);
  // IA state
  const [iaResult,  setIaResult]  = useState(sesion?.iaResult || null);
  const [iaLoading, setIaLoading] = useState(false);
  const [iaError,   setIaError]   = useState(null);
  const topRef = useRef(null);
  const ingreso = PRE.ingresoMensual;
  const totalGastoActual = Object.values(gastos).reduce((s,v)=>s+(parseFloat(v)||0),0);
  const fechaGuardada = sesion?.fecha ? new Date(sesion.fecha).toLocaleDateString("es-UY",{day:"numeric",month:"long"}) : null;

  // API key en localStorage — la configura el equipo una sola vez:
  // localStorage.setItem("cr_api_key", "sk-ant-...")
  const getApiKey = () => { try { return localStorage.getItem("cr_api_key")||""; } catch(e){ return ""; } };

  // Generar analisis IA — on demand, llamado por el boton en TabIA
  const generarIA = async (motorOverride) => {
    const motor = motorOverride || diag;
    if (!motor) return;
    const apiKey = getApiKey();
    if (!apiKey) {
      setIaError("No hay clave API configurada. Contacta al equipo.");
      return;
    }
    setIaLoading(true);
    setIaError(null);
    setIaResult(null);
    try {
      const result = await llamarClaudeIA(motor, apiKey);
      setIaResult(result);
      trackEvent("reset_prompt_generated", {plan:motor.planId});
      guardar({gastos, deudas, diag:motor, saldoInicial, iaResult:result});
      // Actualizar CRM con el resultado de IA
      guardarEnCRM(motor, gastos, deudas, result);
    } catch(e) {
      setIaError(e.message || "Error al conectar con Claude. Verifica la clave API.");
    } finally {
      setIaLoading(false);
    }
  };

  // Recalcular cuando cambian deudas en el dashboard
  useEffect(()=>{
    if(step===2 && deudas.length){
      const nuevo = calcularMotorReset(ingreso, gastos, deudas);
      setDiag(nuevo);
      guardar({gastos, deudas, diag:nuevo, saldoInicial, iaResult});
      trackEvent("reset_profile_updated", {score:nuevo.score, plan:nuevo.planId});
    }
  },[deudas]);

  const resetear = () => {
    try{localStorage.removeItem(STORAGE_KEY);}catch(e){}
    setStep(0); setGastos({}); setDeudas([{type:"",balance:"",minPayment:"",status:"",bank:""}]);
    setDiag(null); setSaldoInicial(0); setShowReset(false); setErrors({});
    setIaResult(null); setIaLoading(false); setIaError(null);
    setTimeout(()=>topRef.current?.scrollIntoView({behavior:"smooth"}),50);
  };

  const validate = () => {
    const e={};
    if(step===0 && totalGastoActual===0) e.gastos="Completa al menos un gasto fijo para continuar.";
    if(step===1) deudas.forEach((d,i)=>{if(!d.type)e["t"+i]="1";if(!d.balance)e["b"+i]="1";if(!d.status)e["s"+i]="1";});
    setErrors(e); return !Object.keys(e).length;
  };

  const next = () => {
    if(!validate()) return;
    if(step===0) {
      trackEvent("reset_expenses_completed", {total:totalGastoActual});
      setStep(1);
    } else if(step===1) {
      trackEvent("reset_debts_completed", {count:deudas.length});
      const nuevo = calcularMotorReset(ingreso, gastos, deudas);
      const si = deudas.reduce((s,d)=>s+(parseFloat(d.balance)||0),0);
      setDiag(nuevo); setSaldoInicial(si);
      guardar({gastos, deudas, diag:nuevo, saldoInicial:si});
      trackEvent("reset_plan_generated", {plan:nuevo.planId, score:nuevo.score, nivel:nuevo.reset.nivel_reset});
      // Guardar en CRM — no bloquea el flujo si falla
      guardarEnCRM(nuevo, gastos, deudas, null);
      setStep(2);
    }
    setTimeout(()=>topRef.current?.scrollIntoView({behavior:"smooth"}),50);
  };

  const TABS = [
    {id:"plan",      label:"Tu Plan",           icon:"🎯"},
    {id:"deudas",    label:"Mis deudas",         icon:"✏️"},
    {id:"crono",     label:"Cronograma",         icon:"📅"},
    {id:"sim",       label:"Simulador",          icon:"⚡"},
    {id:"perfil",    label:"Perfil crediticio",  icon:"🏦"},
    {id:"dim",       label:"Dimensiones",        icon:"📐"},
    {id:"ia",        label:"Analisis IA",         icon:"🤖"},
  ];

  const nivelCfg = diag ? {
    color: diag.reset.nivel_reset==="A"?C.accent:diag.reset.nivel_reset==="B"?C.warn:C.danger,
  } : {color:C.accent};

  const isDash = step===2;
  return <div ref={topRef} className={isDash?"mode-dark":"mode-light"} style={{minHeight:"100vh", backgroundImage:isDash?"radial-gradient(ellipse at 15% 0%,"+C.aD+" 0%,transparent 55%),radial-gradient(ellipse at 85% 100%,"+C.bD+" 0%,transparent 55%)":"none", paddingBottom:100}}>

    {/* MODAL RESET */}
    {showReset&&<div style={{position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", zIndex:100, display:"flex", alignItems:"center", justifyContent:"center", padding:20}}>
      <div style={{background:C.card, border:"1px solid "+C.border, borderRadius:18, padding:"28px 24px", maxWidth:360, width:"100%", textAlign:"center"}}>
        <div style={{fontSize:17, fontWeight:700, color:C.text, fontFamily:"'DM Serif Display',serif", marginBottom:8}}>Empezar de nuevo?</div>
        <p style={{fontSize:13, color:C.muted, lineHeight:1.6, marginBottom:22}}>Se va a borrar tu diagnostico y el tracking de recuperacion.</p>
        <div style={{display:"flex", gap:10}}>
          <button onClick={()=>setShowReset(false)} style={{flex:1, background:C.surface, border:"1px solid "+C.border, borderRadius:10, padding:"12px", fontSize:13, color:C.muted, cursor:"pointer", fontFamily:"'Syne',sans-serif", fontWeight:600}}>Cancelar</button>
          <button onClick={resetear} style={{flex:1, background:C.danger, border:"none", borderRadius:10, padding:"12px", fontSize:13, color:"#fff", cursor:"pointer", fontFamily:"'Syne',sans-serif", fontWeight:700}}>Si, borrar</button>
        </div>
      </div>
    </div>}

    {/* HEADER — light en formularios, dark en dashboard */}
    <div style={{background:isDash?C.surface+"F0":"#FFFFFFEE", borderBottom:"1px solid "+(isDash?C.border:L.border), padding:"14px 24px", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:10, backdropFilter:"blur(12px)"}}>
      <div style={{display:"flex", alignItems:"center", gap:10}}>
        <div style={{width:32, height:32, borderRadius:9, background:"linear-gradient(135deg,"+C.accent+","+C.blue+")", display:"flex", alignItems:"center", justifyContent:"center", fontSize:15, fontWeight:900, color:"#0A0C11", fontFamily:"'Syne',sans-serif"}}>C</div>
        <span style={{fontSize:15, fontWeight:800, color:isDash?C.text:L.text, fontFamily:"'Syne',sans-serif", letterSpacing:"-0.02em"}}>Credizona <span style={{color:C.accent}}>Reset</span></span>
      </div>
      <div style={{display:"flex", alignItems:"center", gap:12}}>
        {step===2&&iaLoading&&<span style={{fontSize:11, color:C.accent, fontFamily:"'Syne',sans-serif", display:"flex", alignItems:"center", gap:6}}><span style={{width:10,height:10,border:"1.5px solid "+C.accent+"40",borderTop:"1.5px solid "+C.accent,borderRadius:"50%",display:"inline-block",animation:"spin 0.8s linear infinite"}}/>IA generando...</span>}
        {step===2&&fechaGuardada&&<span style={{fontSize:11, color:C.muted, fontFamily:"'Syne',sans-serif"}}>Guardado {fechaGuardada}</span>}
        {step===2&&<button onClick={()=>setShowReset(true)}
          style={{fontSize:11, color:C.muted, background:"none", border:"1px solid "+C.border, borderRadius:7, padding:"5px 12px", cursor:"pointer", fontFamily:"'Syne',sans-serif", fontWeight:600, transition:"all 0.2s"}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=C.danger;e.currentTarget.style.color=C.danger;}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.color=C.muted;}}>
          Nuevo
        </button>}
        {!isDash&&<span style={{fontSize:10, color:L.muted, fontFamily:"'Syne',sans-serif", textTransform:"uppercase", letterSpacing:"0.07em"}}>Motor Reset v2</span>}
      </div>
    </div>

    <div style={{maxWidth:760, margin:"0 auto", padding:"28px 18px 0", color:isDash?C.text:L.text}}>

      {/* STEP PILLS */}
      {step<2&&<div style={{display:"flex", gap:8, marginBottom:28, alignItems:"center"}}>
        {["Gastos fijos","Tus deudas"].map((s,i)=>(
          <div key={s} style={{display:"flex", alignItems:"center", gap:8}}>
            <div style={{display:"flex", alignItems:"center", gap:6, opacity:i>step?0.4:1, transition:"opacity 0.3s"}}>
              <div style={{width:24, height:24, borderRadius:"50%", background:i<step?L.accent:i===step?L.aD:L.border, border:"2px solid "+(i<=step?L.accent:L.border), display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:800, color:i<step?"#fff":L.accent, fontFamily:"'Syne',sans-serif"}}>{i<step?"v":i+1}</div>
              <span style={{fontSize:12, color:i===step?L.text:L.muted, fontWeight:i===step?700:400, fontFamily:"'Syne',sans-serif"}}>{s}</span>
            </div>
            {i<1&&<div style={{width:24, height:1, background:L.border}}/>}
          </div>
        ))}
      </div>}

      {/* STEP 0: GASTOS */}
      {step===0&&<div className="fade">
        {/* Banner nivel desde encuesta */}
        {PRE.respuestas && Object.values(PRE.respuestas).some(v=>v!==null) && (()=>{
          const enc = calcularScoreEncuesta(PRE.respuestas);
          const col = NIVEL_COLOR[enc.nivel]||C.warn;
          return <div style={{background:col+"15", border:"1px solid "+col+"40", borderRadius:12, padding:"12px 16px", marginBottom:20, display:"flex", gap:10, alignItems:"center"}}>
            <div style={{fontSize:10, fontWeight:800, color:col, fontFamily:"'Syne',sans-serif", letterSpacing:"0.05em"}}>ENCUESTA: NIVEL {enc.nivel} — {enc.score}/100</div>
            {enc.bPlus&&<Tag color={C.purple}>B+</Tag>}
            {enc.flagsRiesgo.length>0&&<div style={{fontSize:10, color:L.muted}}>{enc.flagsRiesgo.length} flag(s) de riesgo detectados</div>}
          </div>;
        })()}

        <div style={{background:L.white, border:"1px solid "+L.border, borderRadius:14, padding:"20px 22px", marginBottom:22, boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
          <div style={{fontSize:10, color:C.accent, fontWeight:800, letterSpacing:"0.08em", textTransform:"uppercase", fontFamily:"'Syne',sans-serif", marginBottom:14}}>Datos de tu solicitud</div>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0 20px"}}>
            {[["Nombre",PRE.nombre],["Cedula",PRE.cedula],["Email",PRE.email],["Ingreso mensual",fmt(PRE.ingresoMensual)],["Situacion laboral",SITUACION_LABELS[PRE.situacionLaboral]||PRE.situacionLaboral],["Motivo de rechazo",MOTIVO_LABELS[PRE.motivoRechazo]||PRE.motivoRechazo]].map(([lbl,val])=>(
              <div key={lbl} style={{marginBottom:14}}>
                <div style={{fontSize:10, color:L.muted, letterSpacing:"0.06em", textTransform:"uppercase", fontFamily:"'Syne',sans-serif", marginBottom:4}}>{lbl}</div>
                <div style={{background:L.surface, border:"1px solid "+L.border, borderRadius:9, padding:"10px 13px", color:L.subtle, fontSize:14}}>{val}</div>
              </div>
            ))}
          </div>
        </div>

        <h2 style={{fontSize:22, color:L.text, fontFamily:"'DM Serif Display',serif", marginBottom:6}}>Cuanto gastas por mes?</h2>
        <p style={{fontSize:13, color:L.muted, marginBottom:22, lineHeight:1.65}}>Completa tus gastos fijos. La precision define la calidad del plan.</p>
        {errors.gastos&&<div style={{background:L.dD, border:"1px solid "+L.dB, borderRadius:8, padding:"10px 14px", marginBottom:14, fontSize:12, color:L.danger}}>Completa al menos un gasto fijo.</div>}
        <div style={{background:L.white, border:"1px solid "+L.border, borderRadius:14, padding:"20px 22px 6px", marginBottom:14, boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
          {EXPENSE_CATS.map(cat=>(
            <div key={cat.key} style={{marginBottom:16}}>
              <div style={{fontSize:10, color:L.muted, letterSpacing:"0.06em", textTransform:"uppercase", fontFamily:"'Syne',sans-serif", marginBottom:5}}>{cat.label}</div>
              <div style={{position:"relative"}}>
                <span style={{position:"absolute", left:12, top:"50%", transform:"translateY(-50%)", color:L.accent, fontSize:13, fontWeight:700}}>$</span>
                <input type="number" value={gastos[cat.key]||""} onChange={e=>setGastos(g=>({...g,[cat.key]:e.target.value}))} placeholder="0"
                  style={{width:"100%", boxSizing:"border-box", background:L.surface, border:"1.5px solid "+L.border, borderRadius:9, padding:"11px 13px 11px 27px", color:L.text, fontSize:14, outline:"none", transition:"border 0.2s"}}
                  onFocus={e=>e.target.style.borderColor=L.accent} onBlur={e=>e.target.style.borderColor=L.border}/>
              </div>
            </div>
          ))}
        </div>
        {totalGastoActual>0&&<div style={{background:L.aD, border:"1px solid "+L.aB, borderRadius:10, padding:"13px 18px", display:"flex", justifyContent:"space-between", alignItems:"center"}}>
          <span style={{fontSize:12, color:L.muted, fontFamily:"'Syne',sans-serif"}}>Total gastos ingresados</span>
          <span style={{fontSize:19, fontWeight:700, fontFamily:"'DM Serif Display',serif", color:totalGastoActual>ingreso*0.9?L.danger:totalGastoActual>ingreso*0.7?L.warn:L.accent}}>{fmt(totalGastoActual)}</span>
        </div>}
      </div>}

      {/* STEP 1: DEUDAS */}
      {step===1&&<div className="fade">
        <h2 style={{fontSize:22, color:L.text, fontFamily:"'DM Serif Display',serif", marginBottom:6}}>Carga tus deudas</h2>
        <p style={{fontSize:13, color:L.muted, marginBottom:22, lineHeight:1.65}}>Una por una. Si no sabes el saldo exacto, ingresa una estimacion.</p>
        {deudas.map((d,i)=><DebtFormCardLight key={i} debt={d} index={i} onChange={v=>setDeudas(ds=>ds.map((x,idx)=>idx===i?v:x))} onRemove={()=>setDeudas(ds=>ds.filter((_,idx)=>idx!==i))}/>)}
        <button onClick={()=>setDeudas(d=>[...d,{type:"",balance:"",minPayment:"",status:"",bank:""}])}
          style={{width:"100%", background:"none", border:"1.5px dashed "+L.border, borderRadius:10, padding:"12px", color:L.muted, fontSize:12, cursor:"pointer", fontFamily:"'Syne',sans-serif", fontWeight:700, transition:"all 0.2s"}}
          onMouseEnter={e=>{e.currentTarget.style.borderColor=L.aB;e.currentTarget.style.color=L.accent;}}
          onMouseLeave={e=>{e.currentTarget.style.borderColor=L.border;e.currentTarget.style.color=L.muted;}}>
          + Agregar otra deuda
        </button>
      </div>}

      {/* STEP 2: DASHBOARD */}
      {step===2&&diag&&<div className="fade">
        <div style={{marginBottom:20}}>
          <h2 style={{fontSize:22, color:C.text, fontFamily:"'DM Serif Display',serif", marginBottom:4}}>
            Tu plan Reset, {PRE.nombre.split(" ")[0]}
          </h2>
          <div style={{display:"flex", gap:8, alignItems:"center", flexWrap:"wrap"}}>
            <span style={{fontSize:12, color:C.muted}}>Plan</span>
            <Tag color={PLAN_COLOR[diag.planId]||C.accent}>{diag.plan.titulo}</Tag>
            <span style={{fontSize:11, color:C.muted}}>· Reevaluacion en {diag.plan.reevaluacion}</span>
          </div>
        </div>
        <div style={{marginBottom:20}}><Tabs tabs={TABS} active={activeTab} onChange={setActiveTab}/></div>
        {activeTab==="plan"   &&<TabPlanReset   diag={diag} onGoToTab={setActiveTab}/>}
        {activeTab==="deudas" &&<TabDeudas      deudas={deudas} onChange={setDeudas} diag={diag}/>}
        {activeTab==="crono"  &&<TabCronograma  cronograma={diag.cronograma} deudas={deudas} flujoLibre={diag.flujoLibre}/>}
        {activeTab==="sim"    &&<TabSimulador   diag={diag} ingreso={ingreso}/>}
        {activeTab==="perfil" &&<TabPerfil      factores={diag.perfilFactores}/>}
        {activeTab==="dim"    &&<TabDimensiones dimensiones={diag.dimensiones}/>}
        {activeTab==="ia"     &&<TabIA diag={diag} iaResult={iaResult} iaLoading={iaLoading} iaError={iaError} onGenerar={generarIA}/>}
      </div>}

      {/* NAVEGACION — light en formularios */}
      {step<2&&<div style={{display:"flex", justifyContent:"space-between", marginTop:24, alignItems:"center"}}>
        {step>0
          ?<button onClick={()=>setStep(s=>s-1)} style={{background:L.white, border:"1.5px solid "+L.border, borderRadius:10, padding:"11px 22px", color:L.muted, fontSize:13, cursor:"pointer", fontFamily:"'Syne',sans-serif", fontWeight:700, transition:"all 0.2s", boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=L.border2;e.currentTarget.style.color=L.text;}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=L.border;e.currentTarget.style.color=L.muted;}}>Atras</button>
          :<div/>}
        <button onClick={next} style={{background:L.accent, border:"none", borderRadius:10, padding:"12px 28px", fontSize:14, fontWeight:800, color:"#fff", cursor:"pointer", fontFamily:"'Syne',sans-serif", boxShadow:"0 4px 20px "+L.accent+"40", transition:"all 0.2s"}}
          onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 8px 28px "+L.accent+"55";}}
          onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="0 4px 20px "+L.accent+"40";}}>
          {step===1?"Ver mi plan Reset":"Continuar"}
        </button>
      </div>}
    </div>

    {/* STICKY BAR */}
    {step===2&&<div style={{position:"fixed", bottom:0, left:0, right:0, background:C.surface+"F5", borderTop:"1px solid "+C.border, padding:"12px 24px", backdropFilter:"blur(12px)", zIndex:9}}>
      <div style={{maxWidth:760, margin:"0 auto", display:"flex", alignItems:"center", justifyContent:"space-between", gap:16}}>
        <div>
          <div style={{fontSize:11, color:C.muted}}>Proximo paso</div>
          <div style={{fontSize:13, fontWeight:700, color:C.text, fontFamily:"'Syne',sans-serif", marginTop:1}}>{diag?.plan?.cta||"Revisa tu plan de accion"}</div>
        </div>
        <button onClick={()=>setActiveTab("ia")} style={{background:"linear-gradient(135deg,"+nivelCfg.color+","+nivelCfg.color+"CC)", border:"none", borderRadius:10, padding:"10px 20px", fontSize:13, fontWeight:800, color:"#0A0C11", cursor:"pointer", fontFamily:"'Syne',sans-serif", flexShrink:0, transition:"all 0.2s"}}
          onMouseEnter={e=>e.currentTarget.style.transform="translateY(-1px)"}
          onMouseLeave={e=>e.currentTarget.style.transform="translateY(0)"}>
          {iaLoading?"Generando IA...":"Analisis IA"}
        </button>
      </div>
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
