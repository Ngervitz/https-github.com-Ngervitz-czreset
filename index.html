<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Credizona Reset</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#050914; --panel:#0b1630; --surface:#071225;
  --green:#5cff70; --green2:#35d85e; --grad:linear-gradient(90deg,#5cff70,#35d85e);
  --text:#f7fbff; --muted:#a9b4cc; --subtle:#7a8aaa;
  --danger:#ff7538; --warn:#ffd447; --blue:#4B8EF0; --purple:#9B72F0;
  --border:rgba(255,255,255,.10); --border2:rgba(255,255,255,.18);
  --shadow:0 30px 80px rgba(0,0,0,.45);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  min-height:100vh;
  font-family:Inter,ui-sans-serif,system-ui,sans-serif;
  background:
    radial-gradient(circle at 12% 8%,rgba(92,255,112,.15),transparent 25%),
    radial-gradient(circle at 70% 8%,rgba(85,46,180,.28),transparent 25%),
    linear-gradient(180deg,#050914 0%,#071225 52%,#050914 100%);
  color:var(--text);line-height:1.5;
}
a{text-decoration:none;color:inherit;}
input,select,textarea{font-family:inherit;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
input[type=range]{height:4px;accent-color:var(--green);}
select{appearance:none;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:#1a2540;border-radius:4px;}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
@keyframes scoreAnim{from{stroke-dasharray:0 999}to{}}
.fade{animation:fadeUp .3s ease both;}
.skeleton{background:linear-gradient(90deg,#0b1630 25%,#1a2848 50%,#0b1630 75%);background-size:400px 100%;animation:shimmer 1.4s infinite;border-radius:8px;}

/* HEADER */
.header{
  position:sticky;top:0;z-index:50;
  background:rgba(5,9,20,.92);backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(255,255,255,.07);
  padding:14px 24px;
  display:flex;align-items:center;justify-content:space-between;
}
.brand{display:flex;align-items:center;gap:10px;}
.brand img{height:26px;filter:brightness(0) invert(1);}
.brand-sep{width:1px;height:14px;background:rgba(255,255,255,.2);}
.brand-tag{font-size:11px;font-weight:900;color:var(--green);letter-spacing:.12em;text-transform:uppercase;}
.header-right{display:flex;align-items:center;gap:12px;}
.header-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;}
#header-day{font-size:11px;font-weight:700;color:var(--green);}
#header-saved{font-size:11px;color:var(--muted);}
#btn-nuevo{background:none;border:1px solid var(--border);border-radius:7px;padding:5px 12px;font-size:11px;color:var(--muted);cursor:pointer;font-weight:700;transition:all .2s;}
#btn-nuevo:hover{border-color:var(--danger);color:var(--danger);}

/* MAIN CONTAINER */
.main{max-width:760px;margin:0 auto;padding:28px 18px 120px;}

/* CARDS */
.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;}
.card-green{background:linear-gradient(180deg,rgba(11,22,48,.96),rgba(8,18,40,.98));border:2px solid rgba(92,255,112,.35);border-radius:20px;box-shadow:var(--shadow);}
.card-strong{background:linear-gradient(180deg,rgba(11,22,48,.96),rgba(8,18,40,.98));border:1px solid rgba(255,255,255,.08);border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.4);}

/* LABEL */
.lbl{font-size:10px;color:var(--subtle);letter-spacing:.06em;text-transform:uppercase;font-weight:700;display:block;margin-bottom:5px;}

/* INPUTS */
.inp{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:11px 13px;color:var(--text);font-size:14px;outline:none;transition:border .2s;font-family:inherit;}
.inp:focus{border-color:var(--green);}
.inp-prefix{position:relative;}
.inp-prefix .inp{padding-left:27px;}
.inp-prefix .pfx{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--green);font-weight:700;font-size:13px;}
select.inp{cursor:pointer;}

/* STEP PILLS */
.steps-nav{display:flex;gap:8px;align-items:center;margin-bottom:28px;}
.step-pill{display:flex;align-items:center;gap:6px;}
.step-pill .num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;border:2px solid var(--border);background:rgba(255,255,255,.06);color:var(--green);transition:all .3s;}
.step-pill .num.done{background:var(--green);border-color:var(--green);color:#041008;}
.step-pill .num.active{background:rgba(92,255,112,.1);border-color:var(--green);}
.step-pill .name{font-size:12px;color:var(--muted);font-weight:600;}
.step-pill .name.active{color:var(--text);font-weight:800;}
.step-divider{width:24px;height:1px;background:var(--border);}

/* BUTTONS */
.btn-primary{background:var(--grad);border:none;border-radius:12px;padding:13px 28px;font-size:14px;font-weight:900;color:#041008;cursor:pointer;font-family:inherit;text-transform:uppercase;letter-spacing:.02em;box-shadow:0 4px 24px rgba(92,255,112,.28);transition:all .2s;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(92,255,112,.4);}
.btn-secondary{background:rgba(255,255,255,.05);border:1.5px solid var(--border);border-radius:10px;padding:11px 22px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .2s;}
.btn-secondary:hover{border-color:var(--border2);color:var(--text);}
.btn-icon{background:none;border:none;cursor:pointer;font-size:20px;color:var(--muted);line-height:1;transition:color .2s;padding:0;}
.btn-icon:hover{color:var(--danger);}

/* DEBT FORM CARD */
.debt-card{background:var(--panel);border:1.5px solid var(--border);border-left:3px solid rgba(92,255,112,.3);border-radius:12px;padding:16px 18px;margin-bottom:12px;}
.debt-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.debt-num{font-size:10px;color:var(--green);font-weight:900;letter-spacing:.08em;text-transform:uppercase;}
.debt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* KICKER */
.kicker{display:inline-flex;align-items:center;gap:10px;border:1px solid rgba(92,255,112,.28);color:var(--green);background:rgba(92,255,112,.08);border-radius:999px;padding:9px 16px;font-weight:900;font-size:13px;text-transform:uppercase;letter-spacing:.04em;}
.kicker-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s ease infinite;flex-shrink:0;}

/* HERO */
.hero-wrap{padding:36px 28px 32px;position:relative;overflow:hidden;}
.hero-glow1{position:absolute;top:-60px;left:-60px;width:240px;height:240px;border-radius:50%;background:rgba(92,255,112,.07);pointer-events:none;}
.hero-glow2{position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:rgba(85,46,180,.15);pointer-events:none;}
.hero-logo{display:flex;align-items:center;gap:8px;margin-bottom:20px;position:relative;z-index:1;}
.hero-logo img{height:18px;filter:brightness(0) invert(1);opacity:.9;}
.hero-logo-sep{width:1px;height:12px;background:rgba(255,255,255,.2);}
.hero-logo-tag{font-size:11px;font-weight:900;color:var(--green);letter-spacing:.12em;text-transform:uppercase;}
.hero-h1{font-size:clamp(24px,4.5vw,38px);font-weight:900;color:var(--text);line-height:.97;letter-spacing:-.05em;text-transform:uppercase;margin-bottom:14px;position:relative;z-index:1;}
.hero-h1 span{color:var(--green);}
.hero-sub{font-size:15px;color:#d5dbea;line-height:1.65;margin-bottom:22px;max-width:480px;position:relative;z-index:1;}
.hero-steps{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:22px;position:relative;z-index:1;}
.hero-step{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:7px 12px;}
.hero-step-num{width:22px;height:22px;border-radius:50%;background:var(--green);color:#041008;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0;}
.hero-step-txt{font-size:12px;color:#cbd5e1;font-weight:700;white-space:nowrap;}
.hero-step-arr{color:rgba(255,255,255,.25);font-size:18px;}
.hero-badges{display:flex;gap:14px;align-items:center;flex-wrap:wrap;position:relative;z-index:1;}
.free-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(92,255,112,.12);border:1.5px solid rgba(92,255,112,.35);border-radius:10px;padding:8px 14px;}
.free-badge span{font-size:13px;font-weight:900;color:var(--green);letter-spacing:.02em;}
.secure-txt{font-size:13px;color:var(--subtle);display:flex;align-items:center;gap:5px;}

/* PAIN GRID */
.pain-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;}
.pain-item{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:11px 14px;}
.pain-icon{font-size:16px;flex-shrink:0;}
.pain-txt{font-size:12px;color:var(--muted);font-weight:700;line-height:1.4;}

/* ENCUESTA BANNER */
.enc-banner{border-radius:12px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}

/* READONLY */
.readonly-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 20px;}
.readonly-item{margin-bottom:14px;}
.readonly-val{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:10px 13px;color:#cbd5e1;font-size:14px;font-weight:500;}

/* TOTAL BAR */
.total-bar{background:rgba(92,255,112,.08);border:1px solid rgba(92,255,112,.25);border-radius:10px;padding:13px 18px;display:flex;justify-content:space-between;align-items:center;margin-top:14px;}
.total-lbl{font-size:12px;color:var(--muted);}
.total-val{font-size:19px;font-weight:700;font-family:'DM Serif Display',serif;}

/* TABS */
.tabs{display:flex;gap:4px;overflow-x:auto;padding-bottom:4px;margin-bottom:20px;}
.tabs::-webkit-scrollbar{height:0;}
.tab-btn{padding:8px 14px;border-radius:8px;font-size:11px;font-weight:800;font-family:inherit;cursor:pointer;white-space:nowrap;border:1.5px solid var(--border);background:transparent;color:var(--muted);transition:all .2s;text-transform:uppercase;letter-spacing:.02em;}
.tab-btn.active{border-color:var(--green);background:rgba(92,255,112,.08);color:var(--green);}

/* SCORE METER */
.score-wrap{display:flex;flex-direction:column;align-items:center;}
.score-svg circle.track{stroke:var(--border);}
.score-svg circle.fill{stroke-linecap:round;transform:rotate(-90deg);transform-origin:center;transition:stroke-dasharray .05s linear,stroke .4s;}

/* METRIC CARDS */
.metrics-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px;}
.metric-card{padding:14px 12px;text-align:center;}
.metric-lbl{font-size:10px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;}
.metric-val{font-size:17px;font-weight:700;font-family:'DM Serif Display',serif;}
.metric-sub{font-size:10px;color:var(--muted);margin-top:3px;}

/* PLAN */
.plan-hero{padding:22px 20px;margin-bottom:14px;}
.plan-icon{font-size:28px;}
.plan-tag{font-size:10px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;}
.plan-title{font-size:20px;font-weight:900;color:var(--text);font-family:'DM Serif Display',serif;}
.plan-inner{background:var(--panel);border-radius:10px;padding:12px 14px;margin-top:12px;}
.plan-inner-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}

/* ACTION CARDS */
.action-card{padding:15px 16px;margin-bottom:10px;display:flex;gap:12px;border-radius:10px;}
.action-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0;}
.action-title{font-size:14px;font-weight:700;font-family:'DM Serif Display',serif;margin-bottom:5px;}
.action-detail{font-size:13px;color:var(--subtle);line-height:1.65;}
.badge{font-size:9px;font-weight:900;padding:2px 8px;border-radius:5px;border:1px solid;text-transform:uppercase;letter-spacing:.08em;display:inline-block;}

/* PROGRESS BAR */
.progress-wrap{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.progress-bar{height:100%;border-radius:3px;transition:width .5s ease;}

/* CRONOGRAMA */
.crono-bar-wrap{display:flex;align-items:flex-end;gap:2px;height:72px;margin:10px 0;}
.crono-bar{flex:1;border-radius:2px 2px 0 0;opacity:.85;transition:height .3s;}
.hito-row{display:flex;align-items:center;gap:12px;padding:10px 14px;margin-bottom:8px;}
.hito-mes{font-size:11px;color:var(--green);font-weight:700;text-transform:uppercase;width:52px;flex-shrink:0;}
.hito-val{font-size:13px;font-weight:700;font-family:'DM Serif Display',serif;min-width:90px;text-align:right;}
.hito-pct{font-size:10px;color:var(--muted);width:32px;text-align:right;}

/* SIMULADOR */
.sim-scenario{padding:7px 14px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;transition:all .2s;}
.sim-scenario:hover{border-color:var(--green);color:var(--green);}
.sim-result{padding:14px;}
.sim-lbl{font-size:10px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;}
.sim-val{font-size:17px;font-weight:700;font-family:'DM Serif Display',serif;}

/* PERFIL */
.perfil-row{padding:16px 18px;margin-bottom:12px;border-radius:12px;}
.perfil-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.perfil-badge-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.perfil-nombre{font-size:14px;font-weight:700;font-family:'DM Serif Display',serif;}
.perfil-status{margin-left:auto;font-size:9px;font-weight:800;padding:2px 8px;border-radius:5px;border:1px solid;text-transform:uppercase;letter-spacing:.07em;}
.perfil-desc{font-size:13px;color:var(--subtle);line-height:1.65;margin-left:34px;}
.perfil-accion{margin-top:10px;margin-left:34px;border-radius:7px;padding:8px 12px;font-size:12px;font-weight:700;}

/* DIMENSIONES */
.dim-row{padding:14px 18px;margin-bottom:10px;}
.dim-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.dim-name{font-size:13px;font-weight:700;}
.dim-desc{font-size:11px;color:var(--muted);margin-top:1px;}
.dim-val{font-size:20px;font-weight:700;font-family:'DM Serif Display',serif;}

/* IA TAB */
.ia-invite{padding:28px 24px;text-align:center;}
.ia-features{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:14px 0 20px;}
.ia-feature{background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--subtle);}
.ia-result-msg{padding:20px 22px;margin-bottom:14px;}
.ia-section{padding:16px 18px;margin-bottom:12px;}
.ia-section-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.ia-icon{font-size:16px;}
.ia-section-title{font-size:13px;font-weight:700;}
.ia-text{font-size:13px;color:var(--subtle);line-height:1.7;white-space:pre-line;}
.ia-priorities{display:grid;gap:0;}
.ia-priority{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.ia-priority:last-child{border-bottom:none;}
.ia-p-num{width:22px;height:22px;border-radius:50%;background:rgba(92,255,112,.1);border:1.5px solid rgba(92,255,112,.3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:var(--green);flex-shrink:0;}
.ia-primer-paso{padding:18px 20px;}
.ia-primer-lbl{font-size:10px;color:var(--green);font-weight:900;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;}
.ia-primer-txt{font-size:14px;color:var(--text);font-weight:600;line-height:1.65;}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:inline-block;margin-right:8px;}

/* MIS DEUDAS */
.deudas-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px;}
.deuda-live-card{padding:16px 18px;margin-bottom:12px;border-radius:12px;transition:opacity .3s;}
.deuda-live-card.cancelada{opacity:.6;}
.deuda-live-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
.deuda-live-name{font-size:14px;font-weight:700;font-family:'DM Serif Display',serif;}
.deuda-live-status{font-size:11px;font-weight:700;margin-top:3px;}
.btn-cancelar{background:rgba(92,255,112,.1);border:1px solid rgba(92,255,112,.3);border-radius:8px;padding:6px 14px;font-size:11px;font-weight:800;color:var(--green);cursor:pointer;font-family:inherit;transition:all .2s;flex-shrink:0;}
.btn-cancelar:hover{background:var(--green);color:#041008;}
.deuda-saldo-input{position:relative;}
.deuda-saldo-prefix{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--green);font-weight:700;font-size:13px;}
.deuda-saldo-inp{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:10px 13px 10px 27px;font-size:14px;color:var(--text);outline:none;transition:border .2s;font-family:inherit;}
.deuda-saldo-inp:focus{border-color:var(--green);}

/* ALERTS */
.alert{padding:14px 16px;margin-bottom:14px;border-radius:12px;}
.alert-title{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.alert p{font-size:12px;color:var(--subtle);margin-bottom:4px;line-height:1.5;}

/* PROGRESS HERO */
.progress-hero{padding:16px 18px;margin-bottom:14px;}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.progress-title{font-size:13px;font-weight:700;}
.progress-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.progress-pct{font-size:22px;font-weight:700;font-family:'DM Serif Display',serif;}
.progress-pct-lbl{font-size:10px;color:var(--muted);}
.progress-dates{display:flex;justify-content:space-between;margin-top:6px;font-size:11px;color:var(--muted);}

/* NIVEL COLORS */
.nc-A{color:#5cff70;} .nb-A{background:rgba(92,255,112,.08);border:1.5px solid rgba(92,255,112,.4);}
.nc-B{color:#ffd447;} .nb-B{background:rgba(255,212,71,.08);border:1.5px solid rgba(255,212,71,.4);}
.nc-Bplus{color:#9B72F0;} .nb-Bplus{background:rgba(155,114,240,.08);border:1.5px solid rgba(155,114,240,.4);}
.nc-C{color:#ff7538;} .nb-C{background:rgba(255,117,56,.08);border:1.5px solid rgba(255,117,56,.4);}
.nc-M{color:#5cff70;} .nc-R{color:#ffd447;} .nc-K{color:#ff7538;}

/* STICKY */
.sticky{position:fixed;bottom:0;left:0;right:0;z-index:60;background:rgba(5,9,20,.94);backdrop-filter:blur(14px);border-top:1px solid rgba(255,255,255,.08);padding:12px 24px;}
.sticky-inner{max-width:760px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;}
.sticky-lbl{font-size:11px;color:var(--muted);}
.sticky-step{font-size:13px;font-weight:700;margin-top:1px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:var(--panel);border:1px solid var(--border);border-radius:18px;padding:28px 24px;max-width:360px;width:100%;text-align:center;}
.modal-title{font-size:17px;font-weight:700;font-family:'DM Serif Display',serif;color:var(--text);margin-bottom:8px;}
.modal-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:22px;}
.modal-actions{display:flex;gap:10px;}
.btn-cancel-modal{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px;font-size:13px;color:var(--muted);cursor:pointer;font-family:inherit;font-weight:700;}
.btn-danger{flex:1;background:var(--danger);border:none;border-radius:10px;padding:12px;font-size:13px;color:#fff;cursor:pointer;font-family:inherit;font-weight:800;}

/* CRONO EXTRA INPUT */

<script>
// =============================================================================
// ALGORITHM VERSION & EVENTS
// =============================================================================
const ALGORITHM_VERSION = "reset_v2_plan_engine";

function trackEvent(name, data) {
  console.log("[RESET EVENT]", name, data);
  // TODO: conectar a CRM/analytics
}

// =============================================================================
// PRE-LOADED
// =============================================================================
function getPreLoaded() {
  const p = new URLSearchParams(window.location.search);
  const resp = {};
  for (let i = 1; i <= 10; i++) resp["p" + i] = p.get("p" + i) || null;
  return {
    nombre:           p.get("nombre")        || "Martín Rodríguez",
    cedula:           p.get("cedula")         || "3.456.789-0",
    email:            p.get("email")          || "martin@email.com",
    telefono:         p.get("telefono")       || "",
    ingresoMensual:   parseFloat(p.get("ingreso")) || 65000,
    situacionLaboral: p.get("laboral")        || "relacion_dependencia",
    montoSolicitado:  parseFloat(p.get("monto")) || 0,
    motivoRechazo:    p.get("motivo_rechazo") || "scoring",
    canal:            p.get("canal")          || "web",
    respuestas: resp,
  };
}
const PRE = getPreLoaded();

// =============================================================================
// DETECCIÓN DE SEGMENTO
// Seg 1: rechazado con encuesta (tiene ingreso + P1-P10)
// Seg 2: rechazado sin encuesta (tiene ingreso pero no encuesta)
// Seg 3: público general (sin datos precargados)
// =============================================================================
const SEGMENTO = (() => {
  const tieneIngreso  = !!new URLSearchParams(window.location.search).get("ingreso");
  const tieneEncuesta = Object.values(PRE.respuestas).some(v=>v!==null);
  if (tieneIngreso && tieneEncuesta) return 1;
  if (tieneIngreso && !tieneEncuesta) return 2;
  return 3;
})();

const SEGMENTO_CFG = {
  1: {
    kicker:      "Diagnóstico post-rechazo",
    h1:          "Ya tenemos tu encuesta.",
    h1green:     "Te mostramos una primera lectura.",
    sub:         "Antes de cargar tus gastos y deudas, mirá lo que ya podemos decirte con los datos que tenemos.",
    cta:         "Ver qué me está frenando →",
    showPreview: true,
  },
  2: {
    kicker:      "Diagnóstico post-rechazo",
    h1:          "Te rechazaron el préstamo.",
    h1green:     "Ahora entendé qué hacer.",
    sub:         "Cargá tus gastos y deudas en 5 minutos y te decimos exactamente qué está frenando tu perfil y cómo mejorar.",
    cta:         "Empezar diagnóstico →",
    showPreview: false,
  },
  3: {
    kicker:      "Diagnóstico financiero gratuito",
    h1:          "Entendé tu situación financiera.",
    h1green:     "Sabé qué hacer primero.",
    sub:         "Cargá tus gastos y deudas en 5 minutos. Te decimos en qué estás, qué te frena y cuál es el primer paso.",
    cta:         "Hacer mi diagnóstico gratis →",
    showPreview: false,
  },
};

const SITUACION_LABELS = {
  relacion_dependencia:"Relación de dependencia", monotributista:"Monotributista",
  responsable_inscripto:"Responsable inscripto", informal:"Trabajo informal", desempleado:"Sin ingreso fijo",
};
const MOTIVO_LABELS = {
  scoring:"Score insuficiente", mora:"Deudas en mora", ratio:"Ratio deuda/ingreso alto",
  documentacion:"Documentación incompleta", antiguedad:"Antigüedad laboral insuficiente", otro:"Otro",
};
const DEBT_TYPES = [
  "Tarjeta de crédito","Préstamo personal","Casa financiera",
  "Cuotas / financiación","Servicios atrasados","DGI / BPS","Préstamo informal","Otro",
];
const EXPENSE_CATS = [
  {k:"alquiler",l:"Alquiler / Gastos comunes"},
  {k:"servicios",l:"Servicios (UTE, OSE, ANTEL, internet)"},
  {k:"alimentacion",l:"Alimentación y supermercado"},
  {k:"transporte",l:"Transporte"},
  {k:"salud",l:"Salud / mutualista"},
  {k:"educacion",l:"Educación"},
  {k:"otros",l:"Otros gastos fijos"},
];
const MORA_ORDER = {en_mora:0, atraso_grave:1, atraso_leve:2, al_dia:3};

// =============================================================================
// STATE
// =============================================================================
let step = 0;
let gastos = {};
let deudas = [{type:"",bank:"",balance:"",minPayment:"",status:""}];
let diag = null;
let saldoInicial = 0;
let snapshot = null;
let activeTab = "plan";
let iaResult = null;
let iaLoading = false;
let iaError = null;
let simState = {g:0,p:0,i:0};
let cronoExtra = 0;

// =============================================================================
// STORAGE
// =============================================================================
const STORAGE_KEY = "cr_v3";
function guardar(extra={}) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      step, gastos, deudas, diag, saldoInicial, snapshot,
      iaResult, algorithm_version: ALGORITHM_VERSION,
      fecha: new Date().toISOString(), ...extra
    }));
  } catch(e){}
}
function cargar() {
  try { const r = localStorage.getItem(STORAGE_KEY); return r ? JSON.parse(r) : null; } catch(e){ return null; }
}

// =============================================================================
// MOTOR — ENCUESTA
// =============================================================================
function p2n(r){ return r==="A"?3:r==="B"?2:r==="C"?1:r==="D"?0:null; }
function clamp(n,a,b){ return Math.max(a,Math.min(b,n)); }

function calcularScoreEncuesta(resp) {
  if (!resp) return {score:50,nivel:"B",bPlus:false,bloques:{},flagsRiesgo:[]};
  const v = k => p2n(resp["p"+k]);
  const norm = arr => arr.filter(x=>x!==null).length
    ? arr.filter(x=>x!==null).reduce((s,x)=>s+x,0) / (arr.filter(x=>x!==null).length*3) * 100 : 50;
  const n1=norm([v(1),v(2),v(7)]);
  const n2=norm([v(4),v(6),v(10)]);
  const n3=norm([v(3),v(9)]);
  const n4=norm([v(5),v(8)]);
  const score = Math.round(n1*.30 + n2*.30 + n3*.20 + n4*.20);
  let nivel = score>=70?"A":score>=40?"B":"C";
  const baselineNivel = nivel;
  const flagsRiesgo = [];
  if(resp.p6==="D"){nivel="C";flagsRiesgo.push("p6_D");}
  if(resp.p8==="D"){nivel="C";flagsRiesgo.push("p8_D");}
  if(resp.p10==="D"){nivel="C";flagsRiesgo.push("p10_D");}
  if(nivel==="A"&&(resp.p3==="C"||resp.p3==="D")){nivel="B";flagsRiesgo.push("p3_bajo");}
  if(nivel==="A"&&resp.p5==="D"){nivel="B";flagsRiesgo.push("p5_D");}
  if(nivel==="A"&&resp.p7==="D"){nivel="B";flagsRiesgo.push("p7_D");}
  const bPlus = nivel==="B"&&resp.p8==="A"&&(resp.p3==="A"||resp.p3==="B")&&(resp.p10==="A"||resp.p10==="B");
  return {score,nivel:bPlus?"B+":nivel,nivelBase:nivel,baselineNivel,bPlus,flagsRiesgo,
    bloques:{b1:Math.round(n1),b2:Math.round(n2),b3:Math.round(n3),b4:Math.round(n4)}};
}

// =============================================================================
// MOTOR — FINANCIERO
// =============================================================================
function calcularFinanciero(ingreso, gastos, deudas) {
  const totalGastos = Object.values(gastos).reduce((s,v)=>s+(parseFloat(v)||0),0);
  const totalDeuda  = deudas.reduce((s,d)=>s+(parseFloat(d.balance)||0),0);
  const pagoMinimo  = deudas.reduce((s,d)=>s+(parseFloat(d.minPayment)||0),0);
  const flujoLibre  = ingreso - totalGastos - pagoMinimo;
  const ratio       = ingreso>0 ? pagoMinimo/ingreso : 0;
  const cantDeudas  = deudas.length;
  const cantMoras   = deudas.filter(d=>d.status==="en_mora"||d.status==="atraso_grave").length;
  const cantInf     = deudas.filter(d=>d.type==="Préstamo informal").length;
  let score = 100;
  if(ratio>0.50)score-=38; else if(ratio>0.35)score-=24; else if(ratio>0.20)score-=10;
  if(flujoLibre<0)score-=32; else if(flujoLibre<ingreso*.10)score-=14;
  score -= Math.min(cantMoras*12,25);
  if(cantInf>0)score-=16;
  if(cantDeudas>=5)score-=10;
  if(totalGastos>ingreso*.85)score-=10;
  score = clamp(Math.round(score),0,100);
  return {totalGastos,totalDeuda,pagoMinimo,flujoLibre,ratio,cantDeudas,cantMoras,cantInf,scoreFinanciero:score};
}

// =============================================================================
// MOTOR — DIMENSIONES
// =============================================================================
function calcularDimensiones(resp, fin, ingreso) {
  const v = k => p2n(resp?.["p"+k]);
  const n2 = (a,b) => {
    const vals=[v(a),v(b)].filter(x=>x!==null);
    return vals.length ? Math.round(vals.reduce((s,x)=>s+x,0)/(vals.length*3)*100):50;
  };
  const n1 = k => { const val=v(k); return val!==null?Math.round(val/3*100):50; };
  const n3 = ks => {
    const vals=ks.map(k=>v(k)).filter(x=>x!==null);
    return vals.length?Math.round(vals.reduce((s,x)=>s+x,0)/(vals.length*3)*100):50;
  };
  return {
    organizacion:     n2(1,7),
    resiliencia:      n1(2),
    responsabilidad:  n2(3,9),
    accionReciente:   n1(8),
    conductaAutocontrol: n3([4,6,10]),
    estresFinanciero: n1(5),
    presionDeuda:     clamp(Math.round(fin.ratio*200),0,100),
    liquidez:         fin.flujoLibre>ingreso*.15?80:fin.flujoLibre>0?45:10,
  };
}

// =============================================================================
// PLANES
// =============================================================================
const PLANES = {
  1:{id:1,titulo:"Orden Financiero",icon:"🗂️",color:"#4B8EF0",
    problema:"No tenés claro cuánto ganás, cuánto gastás ni cuánto debés. Sin eso, cualquier plan es a ciegas.",
    objetivo:"Entender exactamente cuánto entra, cuánto sale y cuánto debés. Con eso claro, todo lo demás es más fácil.",
    prioridades:["Anotar todo lo que entra y todo lo que sale este mes. Sin excepción.","Separar lo que no podés dejar de pagar de lo que podés reducir.","Calcular cuánta plata te queda libre cada mes después de pagar todo."],
    cta:"Completar mapa de deudas y gastos",reevaluacion:"30 días"},
  2:{id:2,titulo:"Reducción de Deuda",icon:"📉",color:"#ff7538",
    problema:"Estás pagando demasiado en relación a lo que ganás. Cada mes es un esfuerzo y no alcanzás a salir.",
    objetivo:"Bajar lo que pagás por mes y atacar primero las deudas que más te están frenando.",
    prioridades:["Atacar primero la deuda que más daño te está haciendo — la que está en mora o la más cara.","No sacar ninguna deuda nueva por al menos 30 días. Cero tarjetas, cero cuotas.","Llamar al banco o financiera para negociar. Muchas veces aceptan planes que no publicitan."],
    cta:"Ver deuda prioritaria",reevaluacion:"60 a 90 días"},
  3:{id:3,titulo:"Recuperación Rápida",icon:"🚀",color:"#5cff70",
    problema:"Tu situación está bien encaminada. Hay algunos detalles que corregir para que el banco te diga que sí.",
    objetivo:"Hacer los ajustes puntuales que faltan para que el banco te apruebe en la próxima solicitud.",
    prioridades:["Pagar todo en fecha. Un solo atraso puede echarte atrás meses de progreso.","Bajar lo que pagás en deudas para que sea menos del 30% de lo que ganás.","En 30-60 días volver a evaluar el perfil para ver si ya podés aplicar."],
    cta:"Activar plan 30-60 días",reevaluacion:"30 a 60 días"},
  4:{id:4,titulo:"Estabilización / Riesgo Crítico",icon:"🚨",color:"#ff7538",
    problema:"Tu situación está en un punto crítico. Antes de pensar en un crédito nuevo, hay que estabilizar lo que tenés.",
    objetivo:"Parar la caída primero. Estabilizarte. Después, con la situación ordenada, pensar en el crédito.",
    prioridades:["No agarrar ninguna deuda nueva. Aunque sea tentador, ahora no es el momento.","Ordenar las deudas informales y las que están en mora. Son las que más daño hacen.","Lograr que cada mes te sobre aunque sea un poco. Eso es la base de todo."],
    cta:"Empezar primeros auxilios financieros",reevaluacion:"90 a 120 días"},
  5:{id:5,titulo:"Reperfilamiento",icon:"🔄",color:"#9B72F0",
    problema:"Tu historial financiero está dañado, pero tu actitud muestra que querés salir. Eso es recuperable.",
    objetivo:"Reconstruir tu historial paso a paso. Con constancia y las deudas correctas, es posible.",
    prioridades:["Hacer lo mismo bien durante 60-90 días seguidos. La constancia es lo que reconstruye el historial.","Regularizar o negociar los atrasos que figuran reportados. Eso limpia el perfil.","En 90 días, volver a medir el avance antes de pedir el crédito."],
    cta:"Iniciar seguimiento 90 días",reevaluacion:"90 días"},
};

function asignarPlan(enc, fin, dim) {
  const r = PRE.respuestas;
  if(enc.nivel==="C"||fin.flujoLibre<0||fin.cantInf>0||(fin.cantMoras>=2&&fin.flujoLibre<fin.pagoMinimo*.3)) return 4;
  if(fin.ratio>0.35||fin.cantMoras>0) return 2;
  if(dim.organizacion<50||r.p7==="C"||r.p7==="D"||r.p1==="C"||r.p1==="D") return 1;
  if((enc.nivel==="A"||enc.nivel==="B+")&&fin.ratio<0.35&&fin.cantMoras===0&&fin.flujoLibre>0&&(r.p8==="A"||r.p8==="B")) return 3;
  if((r.p3==="A"||r.p3==="B")&&(r.p8==="A"||r.p8==="B")&&(r.p9==="A"||r.p9==="B")) return 5;
  return 1;
}

// =============================================================================
// MOTOR PRINCIPAL
// =============================================================================
function calcularMotor(ingreso, gastos, deudas) {
  const resp = PRE.respuestas;
  const enc  = calcularScoreEncuesta(resp);
  const fin  = calcularFinanciero(ingreso, gastos, deudas);
  const dim  = calcularDimensiones(resp, fin, ingreso);
  const scoreReset = clamp(Math.round(fin.scoreFinanciero*.55 + enc.score*.45),0,100);
  let nivelR = scoreReset>=70?"A":scoreReset>=40?"B":"C";
  const planId = asignarPlan(enc, fin, dim);
  if(planId===4) nivelR="C";
  if(planId===2&&nivelR==="A") nivelR="B";
  const plan = PLANES[planId];
  const sortedDeudas = [...deudas].sort((a,b)=>(MORA_ORDER[a.status]??3)-(MORA_ORDER[b.status]??3));
  const prioritaria = sortedDeudas[0]||null;
  const mora = deudas.filter(d=>d.status==="en_mora"||d.status==="atraso_grave");
  const alertas=[];
  if(fin.flujoLibre<0) alertas.push("Cada mes gastás más de lo que entra. Eso es urgente.");
  if(mora.length>0) alertas.push(mora.length+" deuda"+(mora.length>1?"s":"")+" sin pagar. Eso es lo primero que mira el banco.");
  if(fin.ratio>0.5) alertas.push("Más de la mitad de tu sueldo ya está comprometido en deudas.");
  if(fin.cantInf>0) alertas.push("Tenés préstamos informales (familia, amigos, prestamistas). Suelen salir más caros de lo que parecen.");
  const perfil = calcularPerfil(fin.ratio, mora, scoreReset, fin.flujoLibre, ingreso, deudas);
  const cronograma = generarCronograma(deudas, fin.flujoLibre>0?fin.flujoLibre:0, 0);
  return {scoreReset, nivelR, planId, plan, enc, fin, dim, mora, prioritaria, alertas, perfil, cronograma,
    nivel:nivelR==="A"?"MANEJABLE":nivelR==="B"?"EN RIESGO":"CRÍTICO"};
}

function generarCronograma(deudas, flujoBase, extra) {
  let flujo = flujoBase + (parseFloat(extra)||0);
  if(flujo<=0) return [];
  const pool = deudas.filter(d=>parseFloat(d.balance)>0)
    .map(d=>({...d,saldo:parseFloat(d.balance)||0,minimo:parseFloat(d.minPayment)||0}))
    .sort((a,b)=>(MORA_ORDER[a.status]??3)-(MORA_ORDER[b.status]??3));
  const meses=[]; let estado=pool.map(d=>({...d})); let mes=0;
  while(estado.some(d=>d.saldo>0)&&mes<60){
    mes++; let ex=flujo;
    estado.forEach(d=>{if(d.saldo>0)d.saldo=Math.max(0,d.saldo-d.minimo);});
    for(const d of estado){if(d.saldo>0&&ex>0){const p=Math.min(d.saldo,ex);d.saldo-=p;ex-=p;}}
    meses.push({mes,totalSaldo:estado.reduce((s,d)=>s+d.saldo,0)});
    estado.forEach(d=>{if(d.saldo===0&&d.minimo>0){flujo+=d.minimo;d.minimo=0;}});
  }
  return meses;
}

function calcularPerfil(ratio, mora, score, flujoLibre, ingreso, deudas) {
  let meses=0;
  if(mora.length>0)meses+=mora.length*3;
  if(ratio>0.5)meses+=9;else if(ratio>0.3)meses+=4;
  if(flujoLibre<0)meses+=6;else if(flujoLibre<ingreso*.2)meses+=2;
  if(score>=70&&mora.length===0&&flujoLibre>ingreso*.2)meses=0;
  meses=Math.max(1,meses);
  return [
    {nombre:"Capacidad de pago",estado:ratio<0.3?"bien":ratio<0.5?"regular":"mal",
      desc:ratio<0.3?`Ratio ${fmt_pct(ratio)}, dentro del rango aceptable (<30%).`:`Ratio ${fmt_pct(ratio)}. Los bancos exigen menos del 30%.`,
      accion:ratio>=0.3?`Meta: que tus deudas no sean más del 30% de tu sueldo (${fmt(ingreso*.3)}/mes en cuotas).`:null},
    {nombre:"Historial de pagos",estado:mora.length===0?"bien":mora.length<=1?"regular":"mal",
      desc:mora.length===0?"Sin deudas en mora. Factor más valorado por los burós.":`${mora.length} deuda(s) en mora. Cada una impacta tu historial por hasta 5 años.`,
      accion:mora.length>0?"Arreglá esas deudas antes de pedir cualquier crédito nuevo.":null},
    {nombre:"Flujo disponible",estado:flujoLibre>ingreso*.15?"bien":flujoLibre>0?"regular":"mal",
      desc:flujoLibre>0?`${fmt(flujoLibre)}/mes disponible. Los bancos exigen al menos 20-25% de margen.`:"Flujo negativo. No hay margen para ninguna cuota adicional.",
      accion:flujoLibre<=ingreso*.15?`Necesitás que te sobre al menos ${fmt(ingreso*.2)} por mes después de pagar todo.`:null},
    {nombre:"Cantidad de deudas",estado:deudas.length<=2?"bien":deudas.length<=4?"regular":"mal",
      desc:deudas.length<=2?"Pocas deudas activas. Perfil limpio.":`${deudas.length} deudas activas. Señal de alerta para analistas de riesgo.`,
      accion:deudas.length>2?"Intentá cancelar al menos 1 o 2 deudas antes de pedir algo nuevo.":null},
    {nombre:"¿Cuándo podrías calificar?",estado:meses<=3?"bien":meses<=9?"regular":"mal",
      desc:meses===0?"Con algunos ajustes pequeños, podrías calificar en menos de 1 mes.":meses===1?"Siguiendo el plan, podrías calificar en aproximadamente 1 mes.":`Siguiendo el plan, estimamos que en ${meses} meses estarías en condiciones de pedir el crédito.`,
      accion:`Meta: en el mes ${meses} tener las deudas al día, sin mora, y que te sobre plata cada mes.`,highlight:true},
  ];
}

// =============================================================================
// HELPERS
// =============================================================================
const fmt = n => "$"+Number(n||0).toLocaleString("es-UY",{maximumFractionDigits:0});
const fmt_pct = n => Math.round((n||0)*100)+"%";
function dias_desde(iso){ return Math.floor((Date.now()-new Date(iso).getTime())/86400000); }

// CONFIGURACIÓN BACKEND — IT debe completar estas variables
// =============================================================================

const RESET_API_TOKEN = "REEMPLAZAR_CON_TOKEN_REAL";

// =============================================================================
// CRM — PAYLOAD COMPLETO
// Todos los datos del cliente, diagnóstico y plan se envían al CRM en un solo POST.
// El CRM debe:
//   1. Buscar el contacto por cédula o email (ya existe — viene del rechazo)
//   2. Actualizar sus propiedades con los datos del Reset
//   3. Guardar el snapshot completo en reset_sesiones
//   4. Si plan_id===4 (crítico), crear tarea de seguimiento en CRM
//   5. Calcular fecha_reevaluacion según plan (ver DIAS_REEVAL abajo)
//   6. Si tiene seguimiento activo (ongoing===true), programar Clearing día 30/60/90
// =============================================================================
const DIAS_REEVAL = {1:30, 2:75, 3:45, 4:105, 5:90};

function buildCRMPayload(motor, tipoEvento, extraData={}) {
  const diasPlan = DIAS_REEVAL[motor.planId] || 60;
  const fechaReeval = new Date(Date.now() + diasPlan * 86400000).toISOString();
  const diasRec = snapshot ? Math.floor((Date.now()-new Date(snapshot.fecha_inicio).getTime())/86400000) : 0;

  return {
    // Identificación del contacto
    user: {
      nombre:          PRE.nombre,
      cedula:          PRE.cedula,
      email:           PRE.email,
      telefono:        PRE.telefono,
      ingreso:         PRE.ingresoMensual,
      laboral:         PRE.situacionLaboral,
      monto_solicitado:PRE.montoSolicitado,
      motivo_rechazo:  PRE.motivoRechazo,
      canal:           PRE.canal,
      segmento:        SEGMENTO, // 1=con encuesta, 2=sin encuesta, 3=general
    },

    // Datos de la encuesta conductual
    encuesta: {
      respuestas:       PRE.respuestas,
      score_v2:         motor.enc.score,
      nivel_final:      motor.enc.nivel,
      nivel_base:       motor.enc.nivelBase,
      b_plus:           motor.enc.bPlus,
      flags_riesgo:     motor.enc.flagsRiesgo,
      bloques:          motor.enc.bloques,
    },

    // Datos financieros declarados
    financiero: {
      gastos_detalle:       gastos,
      deudas_detalle:       deudas.map(d=>({
        tipo:d.type, entidad:d.bank||"",
        saldo:parseFloat(d.balance)||0,
        pago_mensual:parseFloat(d.minPayment)||0,
        estado:d.status,
      })),
      total_gastos:         motor.fin.totalGastos,
      total_deuda:          motor.fin.totalDeuda,
      pago_minimo_total:    motor.fin.pagoMinimo,
      flujo_libre:          motor.fin.flujoLibre,
      ratio_deuda_ingreso:  motor.fin.ratio,
      cantidad_deudas:      motor.fin.cantDeudas,
      cantidad_moras:       motor.fin.cantMoras,
      cantidad_informales:  motor.fin.cantInf,
      score_financiero:     motor.fin.scoreFinanciero,
    },

    // Dimensiones conductuales
    dimensiones: motor.dim,

    // Resultado del motor Reset
    reset: {
      score_reset:          motor.scoreReset,
      nivel_reset:          motor.nivelR,
      plan_id:              motor.planId,
      plan_titulo:          motor.plan.titulo,
      problema_dominante:   motor.plan.problema,
      objetivo:             motor.plan.objetivo,
      prioridades:          motor.plan.prioridades,
      cta:                  motor.plan.cta,
      reevaluacion:         motor.plan.reevaluacion,
      fecha_reevaluacion:   fechaReeval,
      saldo_inicial:        saldoInicial,
      dia_recuperacion:     diasRec,
    },

    // Deuda prioritaria
    prioridad_deuda: motor.prioritaria ? {
      tipo:        motor.prioritaria.type,
      entidad:     motor.prioritaria.bank||"",
      saldo:       parseFloat(motor.prioritaria.balance)||0,
      pago_mensual:parseFloat(motor.prioritaria.minPayment)||0,
      estado:      motor.prioritaria.status,
    } : null,

    // Resultado IA (si ya fue generado)
    ia_resultado: iaResult||null,

    // Recovery snapshot día 0
    snapshot: snapshot||null,

    // Metadata del sistema
    metadata: {
      evento:            tipoEvento,
      algorithm_version: ALGORITHM_VERSION,
      timestamp:         new Date().toISOString(),
      segmento:          SEGMENTO,
      ...extraData,
    },
  };
}

// Envío al CRM — no bloquea el flujo si falla
async function guardarEnCRM(motor, tipoEvento, extraData={}) {
  const payload = buildCRMPayload(motor, tipoEvento, extraData);
  try {
    const res = await fetch(RESET_API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-Reset-Token": RESET_API_TOKEN,
      },
      body: JSON.stringify(payload),
    });
    const data = await res.json();
    if(!data.ok) console.warn("[CRM] Error:", data.error);
    else console.log("[CRM] Guardado. ID:", data.crm_id);
  } catch(e) {
    // No interrumpir el flujo del usuario si el CRM falla
    console.warn("[CRM] No se pudo conectar:", e.message);
  }
}

USUARIO: ${PRE.nombre} | Ingreso: ${fmt(PRE.ingresoMensual)} | Laboral: ${PRE.situacionLaboral}

P2: ${motor.plan.prioridades[1]}
P3: ${motor.plan.prioridades[2]}

Responde SOLO con JSON válido sin markdown:
{"diagnostico":"2-3 oraciones directas.","plan":"Explicación del plan y por qué aplica.","prioridades":["acción 1","acción 2","acción 3"],"primerPaso":"Una acción concreta para hacer esta semana.","mensaje":"Frase motivadora y realista. Directa."}`;
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":ak,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,messages:[{role:"user",content:prompt}]})
    });
    if(!res.ok){const e=await res.json();throw new Error(e.error?.message||"Error "+res.status);}
    const data = await res.json();
    iaResult = JSON.parse((data.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim());
    guardarEnCRM(diag, "reset_prompt_generated");
  } catch(e){ iaError=e.message||"Error al conectar con Claude"; }
  iaLoading=false; renderTab();
}

function init() {
  const sesion = cargar();
  if(sesion && sesion.diag) {
    step=2; gastos=sesion.gastos||{}; deudas=sesion.deudas||[{type:"",bank:"",balance:"",minPayment:"",status:""}];
    diag=sesion.diag; saldoInicial=sesion.saldoInicial||0; snapshot=sesion.snapshot||null;
    iaResult=sesion.iaResult||null;
  }
  render();
}

// =============================================================================
// VALIDATE
// =============================================================================
function validate() {
  if(step===0){
    const total = Object.values(gastos).reduce((s,v)=>s+(parseFloat(v)||0),0);
    if(total===0){ alert("Completá al menos un gasto fijo para continuar."); return false; }
  }
  if(step===1){
    for(const d of deudas){
      if(!d.type||!d.balance||!d.status){ alert("Completá todos los campos de cada deuda."); return false; }
    }
  }
  return true;
}

// =============================================================================
// NAVIGATION
// =============================================================================
function next() {
  if(step<2 && !validate()) return;
  if(step===0){ trackEvent("reset_expenses_completed",{total:Object.values(gastos).reduce((s,v)=>s+(parseFloat(v)||0),0)}); step=1; render(); return; }
  if(step===1){
    trackEvent("reset_debts_completed",{count:deudas.length});
    diag = calcularMotor(PRE.ingresoMensual, gastos, deudas);
    saldoInicial = deudas.reduce((s,d)=>s+(parseFloat(d.balance)||0),0);
    snapshot = {fecha_inicio:new Date().toISOString(),score_reset:diag.scoreReset,nivel:diag.nivelR,plan_id:diag.planId,saldo_inicial:saldoInicial,flujo_inicial:diag.fin.flujoLibre};
    guardar(); trackEvent("reset_plan_generated",{plan:diag.planId,score:diag.scoreReset});
    guardarEnCRM(diag, 'reset_plan_generated');
    step=2; activeTab="plan"; render(); return;
  }
  if(step===2){ switchTab(activeTab); }
}

function prev() { if(step>0&&step<2){step--;render();} }

function resetear() {
  try{localStorage.removeItem(STORAGE_KEY);}catch(e){}
  step=0;gastos={};deudas=[{type:"",bank:"",balance:"",minPayment:"",status:""}];
  diag=null;saldoInicial=0;snapshot=null;iaResult=null;iaLoading=false;iaError=null;
  cerrarModal(); render();
}

function cerrarModal(){ document.getElementById("modal-reset").classList.add("hidden"); }
function abrirModal(){ document.getElementById("modal-reset").classList.remove("hidden"); }

// =============================================================================
// TAB SWITCH
// =============================================================================
function switchTab(id) {
  activeTab = id;
  renderTab();
  // Update tab buttons
  document.querySelectorAll(".tab-btn").forEach(b=>b.classList.toggle("active",b.dataset.tab===id));
}

// =============================================================================
// RENDER
// =============================================================================
function render() {
  updateHeader();
  const main = document.getElementById("main");
  if(step===0) main.innerHTML = renderStep0();
  else if(step===1) main.innerHTML = renderStep1();
  else if(step===2){ main.innerHTML = renderDashboard(); bindDashboard(); }
  updateSticky();
  window.scrollTo({top:0,behavior:"smooth"});
}

function updateHeader() {
  const isDash = step===2;
  const day = document.getElementById("header-day");
  const saved = document.getElementById("header-saved");
  const btnN = document.getElementById("btn-nuevo");
  const lbl = document.getElementById("header-label");
  if(isDash){
    lbl.classList.add("hidden");
    btnN.classList.remove("hidden");
    btnN.onclick = abrirModal;
    if(snapshot){
      const d = dias_desde(snapshot.fecha_inicio);
      if(d>0){day.textContent="Día "+d; day.classList.remove("hidden");}
    }
    const sesion = cargar();
    if(sesion?.fecha){
      saved.textContent="💾 "+new Date(sesion.fecha).toLocaleDateString("es-UY",{day:"numeric",month:"long"});
      saved.classList.remove("hidden");
    }
  } else {
    lbl.classList.remove("hidden");
    lbl.textContent = SEGMENTO===3 ? "Diagnóstico financiero" : "Diagnóstico post-rechazo";
    btnN.classList.add("hidden");
    day.classList.add("hidden");
    saved.classList.add("hidden");
  }
}

function updateSticky() {
  const bar = document.getElementById("sticky-bar");
  const cta = document.getElementById("sticky-cta");
  const txt = document.getElementById("sticky-step-txt");
  if(step===0){ txt.textContent=SEGMENTO_CFG[SEGMENTO].kicker; cta.textContent=SEGMENTO_CFG[SEGMENTO].cta.replace(" →",""); cta.onclick=next; bar.style.display=""; }
  else if(step===1){ txt.textContent="Cargá tus deudas y generá tu plan"; cta.textContent="Ver mi plan Reset"; cta.onclick=next; bar.style.display=""; }
  else if(step===2){
    const urgente = diag && (diag.nivelR==="C" || diag.fin?.cantMoras>0);
    txt.textContent = diag?.plan?.cta||"Revisá tu plan de acción";
    cta.textContent = urgente ? "⚠️ Ver Reset Plus" : "⭐ Reset Plus";
    cta.style.background = urgente ? "linear-gradient(90deg,#ff7538,#dc2626)" : "linear-gradient(90deg,#ffd447,#f59e0b)";
    cta.style.color = "#1a1000";
    cta.onclick = abrirPremium;
    bar.style.display="";
  }
}

// Preview conductual para Segmento 1

  // Key insights from survey answers
  const resp = PRE.respuestas;
  const insights = [];
  if(resp.p1==="A"||resp.p1==="B") insights.push({icon:"✓",txt:"Tenés claridad sobre tus ingresos y gastos",c:"#5cff70"});
  else insights.push({icon:"→",txt:"No tenés claro cuánto entra y sale cada mes",c:"#ffd447"});

  if(resp.p10==="A"||resp.p10==="B") insights.push({icon:"✓",txt:"Sos constante con los hábitos financieros positivos",c:"#5cff70"});
  else if(resp.p10==="D") insights.push({icon:"→",txt:"La constancia es tu punto más débil declarado",c:"#ffd447"});

  return `
  <div style="position:relative;z-index:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:16px 18px;margin-bottom:18px;">

        <div style="font-size:9px;color:#a9b4cc;margin-top:1px;">de 100</div>

function actualizarTotal() {
  const total = Object.values(gastos).reduce((s,v)=>s+(parseFloat(v)||0),0);

  if(bar && val){

function renderStepNav(cur) {
  const steps = ["Gastos fijos","Tus deudas"];
  let html = '<div class="steps-nav">';
  steps.forEach(function(s,i) {
    const numCls = i<cur?"done":i===cur?"active":"";
    const nameCls = i===cur?"active":"";
    const numTxt = i<cur?"&#10003;":(i+1);
    html += '<div class="step-pill">';
    html += '<div class="num '+numCls+'">'+numTxt+'</div>';
    html += '<span class="name '+nameCls+'">'+s+'</span>';
    html += '</div>';
    if(i<1) html += '<div class="step-divider"></div>';
  });
  html += '</div>';
  return html;
}

function renderNavButtons(cur) {
  const backBtn = cur>0 ? '<button class="btn-secondary" onclick="prev()">&#8592; Atras</button>' : '<div></div>';
  const fwdTxt = cur===1 ? "Ver mi plan Reset" : "Continuar";
  return '<div class="nav-actions">' + backBtn + '<button class="btn-primary" onclick="next()">' + fwdTxt + ' &rarr;</button></div>';
}

  const color = pct>0.9?"#ff7538":pct>0.7?"#ffd447":"#5cff70";

  return `<div class="fade">
    <p style="font-size:13px;color:#a9b4cc;margin-bottom:16px;line-height:1.65;">
      Actualizá tus gastos fijos si algo cambió. El plan y el puntaje se recalculan solos.
    </p>

    <!-- Resumen -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">
      <div class="card metric-card">

        <div class="metric-lbl">Sueldo mensual</div>

        <span style="color:${color};font-weight:700;">${Math.round(pct*100)}%</span>
      </div>
      <div class="progress-wrap" style="height:10px;">
        <div class="progress-bar" style="width:${Math.min(pct*100,100)}%;background:${color};height:10px;"></div>
      </div>
      <div style="font-size:11px;color:#7a8aaa;margin-top:5px;">
        ${pct>0.9?"⚠️ Tus gastos son muy altos en relación a lo que ganás":pct>0.7?"Tus gastos son altos — hay margen para reducir":"Tus gastos están bien controlados"}

            ${parseFloat(gastos[c.k]||0)>0?`<span style="font-size:11px;color:#7a8aaa;">${Math.round((parseFloat(gastos[c.k])||0)/ingreso*100)}% del sueldo</span>`:""}

          <div class="inp-prefix">

}

function editarGasto(k, v) {
  gastos[k] = v;
  diag = calcularMotor(PRE.ingresoMensual, gastos, deudas);
  guardar();
  trackEvent("reset_profile_updated", {score:diag.scoreReset, plan:diag.planId});
  // Re-render just the summary without losing focus
  actualizarGastosResumen();
}

function actualizarGastosResumen() {
  // Update the two stat cards and bar without full re-render
  const totalGastos = Object.values(gastos).reduce((s,v)=>s+(parseFloat(v)||0),0);
  const ingreso = PRE.ingresoMensual;
  const pct = ingreso>0 ? totalGastos/ingreso : 0;
  const color = pct>0.9?"#ff7538":pct>0.7?"#ffd447":"#5cff70";
  const totalEl = document.querySelector(".metric-val[data-gastos-total]");
  // Simple: just update the progress bar width and color
  const bar = document.querySelector(".progress-bar[data-gastos-bar]");
  if(bar){ bar.style.width=Math.min(pct*100,100)+"%"; bar.style.background=color; }
}

function bindGastosTab() {
  // Add data attributes for live update
  const bar = document.querySelector(".progress-bar");
  if(bar) bar.setAttribute("data-gastos-bar","1");
}

function renderTabDeudas() {

function renderDeudaLive(d, i) {

}

function bindDeudasTab(){}

function cancelarDeuda(i){
  deudas[i].balance="0"; deudas[i].cancelada=true; deudas[i].status="al_dia";
  recalcularYGuardar();
  document.getElementById("dlive-"+i).outerHTML = renderDeudaLive(deudas[i],i);
  actualizarDeudasStats();
}

function editarDeuda(i, val){
  deudas[i].balance=val; deudas[i].cancelada=false;
  recalcularYGuardar();
  actualizarDeudasStats();
}

function recalcularYGuardar(){
  diag = calcularMotor(PRE.ingresoMensual, gastos, deudas);
  guardar();
  trackEvent("reset_profile_updated",{score:diag.scoreReset,plan:diag.planId});
}

function actualizarDeudasStats(){
  const total = deudas.reduce((s,d)=>s+(parseFloat(d.balance)||0),0);
  const canceladas = deudas.filter(d=>parseFloat(d.balance)===0||d.cancelada).length;
  const el = document.querySelector(".deudas-stats");
  if(el) el.innerHTML = `
    <div class="card metric-card"><div class="metric-lbl">Deuda total</div><div class="metric-val" style="color:#ff7538;">${fmt(total)}</div></div>

    <div class="card metric-card"><div class="metric-lbl">Score actual</div><div class="metric-val" style="color:${nivelColor(diag.nivelR)};">${diag.scoreReset}/100</div></div>`;
}

function renderTabCrono() {
  const crono = generarCronograma(deudas, diag.fin.flujoLibre>0?diag.fin.flujoLibre:0, cronoExtra);
  const totalIni = deudas.reduce((s,d)=>s+(parseFloat(d.balance)||0),0);
  if(!crono.length) return `<div class="fade"><p style="font-size:13px;color:#a9b4cc;">Con flujo libre negativo no es posible proyectar. Primero reducí tus gastos.</p></div>`;
  const bars = crono.filter((_,i)=>i%Math.max(1,Math.floor(crono.length/24))===0||i===crono.length-1);
  return `<div class="fade">
    <p style="font-size:13px;color:#a9b4cc;margin-bottom:16px;line-height:1.65;">Esto muestra cuánto tiempo te lleva salir de tus deudas si seguís el plan. Cada vez que cancelás una deuda, esa plata se destina automáticamente a la siguiente.</p>
    <div class="card crono-extra">
      <span class="crono-extra-lbl">¿Podés pagar algo extra por mes además del mínimo?</span>
      <div style="display:flex;align-items:center;gap:6px;">
        <span style="color:#5cff70;font-weight:700;font-size:13px;">$</span>
        <input class="crono-extra-inp" type="number" id="crono-extra-inp" value="${cronoExtra}" placeholder="0"/>
      </div>
      <span class="crono-result">→ ${crono.length>=60?"más de 5 años":crono.length===1?"1 mes":crono.length<12?crono.length+" meses":Math.floor(crono.length/12)+" año"+(Math.floor(crono.length/12)>1?"s":"")+(crono.length%12>0?" y "+(crono.length%12)+" meses":"")+" para cancelar todo"}</span>
    </div>
    <div style="margin-bottom:6px;font-size:10px;color:#a9b4cc;text-transform:uppercase;letter-spacing:.06em;">Evolución de deuda total</div>
    <div class="crono-bar-wrap">
      ${bars.map(m=>{const pct=totalIni>0?m.totalSaldo/totalIni:0;const c=pct>0.6?"#ff7538":pct>0.3?"#ffd447":"#5cff70";return`<div class="crono-bar" style="height:${Math.max(2,pct*68)}px;background:${c};"></div>`}).join("")}
    </div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:#a9b4cc;margin-bottom:4px;"><span>Deuda hoy: ${fmt(totalIni)}</span><span style="color:#5cff70;">Meta: $0</span></div>
    <div style="font-size:10px;color:#a9b4cc;text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;">¿Cuánto te queda en cada momento?</div>
    ${[1,3,6,12,24,36].filter(m=>m<=crono.length).map(mesN=>{
      const snap=crono[mesN-1]; if(!snap)return"";
      const pct=totalIni>0?((totalIni-snap.totalSaldo)/totalIni*100):100;
      const c=pct>70?"#5cff70":pct>40?"#ffd447":"#ff7538";
      return `<div class="card hito-row" style="margin-bottom:8px;">
        <span class="hito-mes">Mes ${mesN}</span>
        <div style="flex:1;"><div class="progress-wrap"><div class="progress-bar" style="width:${pct}%;background:${c};"></div></div></div>
        <span class="hito-val" style="color:${snap.totalSaldo===0?"#5cff70":"#f7fbff"};">${snap.totalSaldo===0?"✓ Cancelado":fmt(snap.totalSaldo)}</span>
        <span class="hito-pct">${Math.round(pct)}%</span>
      </div>`;
    }).join("")}
  </div>`;
}

function bindCronoTab(){
  const inp = document.getElementById("crono-extra-inp");
  if(inp) inp.oninput = function(){ cronoExtra=parseFloat(this.value)||0; renderTab(); };
}

// =============================================================================
function renderTabSim() {
  const ingreso = PRE.ingresoMensual;
  const d = diag;
  const gastoR = simState.g||0;
  const pagoR  = simState.p||0;
  const ingR   = simState.i||0;
  const nuevoFlujo = d.fin.flujoLibre - gastoR + ingR - pagoR;
  const nuevoPago  = d.fin.pagoMinimo + pagoR;
  const nuevoRatio = ingreso>0 ? nuevoPago/ingreso : 0;
  let ns=100;
  if(nuevoRatio>0.5)ns-=38; else if(nuevoRatio>0.35)ns-=24; else if(nuevoRatio>0.2)ns-=10;
  if(nuevoFlujo<0)ns-=32; else if(nuevoFlujo<ingreso*.1)ns-=14;
  if(d.mora.length>0)ns-=20;
  ns=clamp(Math.round(ns),0,100);
  const delta=ns-d.scoreReset;
  const mejora = nuevoFlujo - d.fin.flujoLibre;

  const scenarios=[
    {l:"Bajo $5.000 en gastos",g:5000,p:0,i:0},
    {l:"Pago $10.000 extra a deudas",g:0,p:10000,i:0},
    {l:"Gano 10% más",g:0,p:0,i:Math.round(ingreso*.1)},
    {l:"Hago todo junto",g:5000,p:10000,i:Math.round(ingreso*.05)}
  ];

  return `<div class="fade">
    <p style="font-size:13px;color:#a9b4cc;margin-bottom:8px;line-height:1.65;">¿Qué pasa si cambiás algo en tu situación? Mové los controles y mirá el resultado.</p>

    <!-- Scenarios rápidos -->
    <div style="margin-bottom:16px;">
      <div class="lbl" style="margin-bottom:8px;">ESCENARIOS RÁPIDOS</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${scenarios.map(s=>`<button class="sim-scenario" onclick="aplicarScenario(${s.g},${s.p},${s.i})">${s.l}</button>`).join("")}
      </div>
    </div>

    <!-- Sliders con lenguaje simple -->
    <div class="card" style="padding:18px 18px 6px;margin-bottom:16px;">
      ${[
        {l:"Si bajo mis gastos en...",k:"g",c:"#5cff70",hint:"alquiler, comida, servicios"},
        {l:"Si pago de más en mis deudas...",k:"p",c:"#ffd447",hint:"suma al mínimo que ya pagás"},
        {l:"Si gano más dinero por mes...",k:"i",c:"#4B8EF0",hint:"changas, aumento, trabajo extra"}
      ].map(({l,k,c,hint})=>`
      <div style="margin-bottom:20px;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;">
          <div>
            <span style="font-size:13px;color:#f7fbff;font-weight:700;">${l}</span>
            <div style="font-size:11px;color:#7a8aaa;margin-top:1px;">${hint}</div>
          </div>
          <span style="font-size:16px;color:${c};font-weight:900;font-family:'DM Serif Display',serif;">${fmt(simState[k]||0)}</span>
        </div>
        <input type="range" min="0" max="${Math.round(ingreso*.6)}" step="500" value="${simState[k]||0}"
          style="width:100%;accent-color:${c};" oninput="updateSim('${k}',this.value)"/>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:#566070;margin-top:3px;">
          <span>$0</span><span>${fmt(Math.round(ingreso*.6))}</span>
        </div>
      </div>`).join("")}
    </div>

    <!-- Resultados en lenguaje simple -->
    <div class="lbl" style="margin-bottom:10px;">LO QUE CAMBIARÍA</div>
    <div style="display:grid;gap:10px;">

      <div class="card" style="padding:16px 18px;border-left:3px solid ${nuevoFlujo>d.fin.flujoLibre?"#5cff70":"#ff7538"};">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div style="font-size:13px;font-weight:700;color:#f7fbff;margin-bottom:3px;">Plata que te sobra cada mes</div>
            <div style="font-size:12px;color:#a9b4cc;">${nuevoFlujo>0?"Después de pagar todo, te quedaría libre:":"Seguirías en rojo por:"}</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:22px;font-weight:700;color:${nuevoFlujo>0?"#5cff70":"#ff7538"};font-family:'DM Serif Display',serif;">${fmt(Math.abs(nuevoFlujo))}</div>
            ${mejora>0?`<div style="font-size:11px;color:#5cff70;">+${fmt(mejora)} más que ahora</div>`:`<div style="font-size:11px;color:#ff7538;">${fmt(mejora)} que ahora</div>`}
          </div>
        </div>
      </div>

      <div class="card" style="padding:16px 18px;border-left:3px solid ${delta>0?"#5cff70":delta<0?"#ff7538":"#a9b4cc"};">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div style="font-size:13px;font-weight:700;color:#f7fbff;margin-bottom:3px;">Tu puntaje estimado</div>

          </div>
          <div style="text-align:right;">
            <div style="font-size:22px;font-weight:700;color:${delta>0?"#5cff70":delta<0?"#ff7538":"#a9b4cc"};font-family:'DM Serif Display',serif;">${ns}<span style="font-size:13px;">/100</span></div>
            ${delta!==0?`<div style="font-size:11px;color:${delta>0?"#5cff70":"#ff7538"};">${delta>0?"+":""}${delta} puntos</div>`:`<div style="font-size:11px;color:#a9b4cc;">sin cambios</div>`}
          </div>
        </div>
      </div>

      ${gastoR>0||pagoR>0||ingR>0?`<div style="background:rgba(92,255,112,.06);border:1px solid rgba(92,255,112,.2);border-radius:12px;padding:14px 16px;font-size:13px;color:#a9b4cc;line-height:1.65;">
        💡 <strong style="color:#5cff70;">Conclusión:</strong> ${delta>5?"Con estos cambios tu situación mejora bastante. Vale la pena intentarlo.":delta>0?"Hay una pequeña mejora. Combiná varias acciones para un impacto mayor.":delta<0?"Estas acciones soñas no mejoran suficiente. Probá otras combinaciones.":"Tu situación se mantiene igual con estos cambios."}
      </div>`:""}
    </div>
  </div>`;
}

function updateSim(k,v){ simState[k]=parseFloat(v)||0; renderTab(); }
function aplicarScenario(g,p,i){ simState={g,p,i}; renderTab(); }

function renderTabPerfil() {
  const PERFIL_SIMPLE = [
    { nombre:"¿Podés pagar una cuota nueva?",
      bueno:"Sí. Tus pagos mensuales actuales son razonables para tu ingreso.",
      regular:"Más o menos. Estás pagando bastante en relación a lo que ganás.",
      malo:"Por ahora no. La mayoría de tu sueldo ya está comprometido en deudas.",
      accionMalo:"El banco ve que no te sobra dinero para pagar algo más. Hay que liberar plata antes de pedir crédito.",
      key:"capacidad" },
    { nombre:"¿Tenés deudas sin pagar?",
      bueno:"No. Tus deudas están todas al día.",
      regular:"Tenés algún atraso. Eso complica un poco tu perfil.",
      malo:"Tenés deudas que no se están pagando. Eso es lo primero que mira el banco y lo que más te afecta.",
      accionMalo:"Hay que arreglar esas deudas antes de intentar sacar un crédito nuevo.",
      key:"mora" },
    { nombre:"¿Te queda plata libre cada mes?",
      bueno:"Sí. Después de pagar todo te queda un margen cómodo.",
      regular:"Poco. Cubrís los gastos pero casi sin margen.",
      malo:"No. Cada mes gastás más de lo que entra, o llegás exacto.",
      accionMalo:"Sin plata libre, no podés pagar una cuota más. Hay que bajar gastos o aumentar ingresos.",
      key:"flujo" },
    { nombre:"¿Cuántas deudas tenés?",
      bueno:"Pocas. Eso da buena imagen.",
      regular:"Varias. No es un problema grave, pero llama la atención.",
      malo:"Muchas. Los bancos ven eso como señal de que dependés mucho del crédito.",
      accionMalo:"Antes de pedir algo nuevo, tratá de cancelar al menos una o dos.",
      key:"cantidad" },
    { nombre:"¿Cuándo podrías calificar para un crédito?",
      highlight:true,
      key:"cuando" }
  ];

  // Map diag.perfil to simple language
  const items = diag.perfil.map((f,i)=>{
    const simple = PERFIL_SIMPLE[i];
    const c = estado_color(f.estado);
    const desc = f.estado==="bien" ? simple.bueno : f.estado==="regular" ? simple.regular : simple.malo;
    const accion = f.estado==="mal" && simple.accionMalo ? simple.accionMalo : f.accion;
    return { ...f, desc, accion, simple };
  });

  return `<div class="fade">
    <p style="font-size:13px;color:#a9b4cc;margin-bottom:18px;line-height:1.65;">Esto es lo que mira el banco cuando recibe tu solicitud. Te explicamos cada punto en simple.</p>
    ${items.map(f=>{
      const c=estado_color(f.estado);
      return `<div class="perfil-row card ${f.highlight?`" style="border:1.5px solid ${c}40;background:${c}08`:""}>
        <div class="perfil-header">
          <div class="perfil-badge-num" style="background:${c}20;border:1.5px solid ${c}60;color:${c};">${estado_icon(f.estado)}</div>
          <span class="perfil-nombre" style="${f.highlight?`color:${c}`:"color:#f7fbff"}">${f.nombre}</span>
          <span class="perfil-status" style="color:${c};background:${c}18;border-color:${c}40;">${estado_lbl(f.estado)}</span>
        </div>
        <p class="perfil-desc">${f.desc}</p>
        ${f.accion?`<div class="perfil-accion" style="background:${c}10;border:1px solid ${c}30;color:${c};">→ ${f.accion}</div>`:""}
      </div>`;
    }).join("")}

    <!-- RESET PLUS CTA en perfil crediticio -->
    <div style="background:linear-gradient(160deg,rgba(255,212,71,.06),rgba(92,255,112,.04));border:2px solid rgba(255,212,71,.25);border-radius:14px;padding:18px;margin-top:8px;">
      <div style="font-size:11px;color:#ffd447;font-weight:800;margin-bottom:6px;">¿Y qué tiene registrado el banco sobre vos?</div>
      <p style="font-size:13px;color:#a9b4cc;line-height:1.6;margin-bottom:14px;">Este análisis es con los datos que vos declaraste. El Reset Plus accede a tu historial real y te dice si hay algo que no sabías — errores, deudas olvidadas, consultas que te están pesando.</p>
      <button class="btn-primary" style="width:100%;background:linear-gradient(90deg,#ffd447,#f59e0b);color:#1a1000;" onclick="abrirPremium()">
        Ver qué ve el banco sobre mí →
      </button>
      <div style="text-align:center;margin-top:8px;font-size:11px;color:#7a8aaa;">Desde UYU 490/mes · Garantía 7 días</div>
    </div>
  </div>`;
}

function renderTabIA() {
  if(iaLoading) return `<div class="fade">
    <p style="font-size:13px;color:#a9b4cc;margin-bottom:16px;">Generando tu análisis personalizado con Claude...</p>
    <div class="skeleton" style="height:100px;margin-bottom:12px;"></div>
    <div class="skeleton" style="height:80px;margin-bottom:12px;"></div>
    <div class="skeleton" style="height:120px;margin-bottom:12px;"></div>
    <div class="skeleton" style="height:60px;"></div>
  </div>`;

  if(iaError) return `<div class="fade">
    <div class="card alert" style="border:1px solid rgba(255,117,56,.3);background:rgba(255,117,56,.08);margin-bottom:14px;">
      <div class="alert-title" style="color:#ff7538;">No se pudo generar el análisis</div>
      <p>${iaError}</p>
    </div>
    <button class="btn-secondary" id="btn-reintentar">Reintentar</button>

  if(!iaResult) return `<div class="fade">
    <div class="card ia-invite" style="border:1px solid rgba(92,255,112,.25);background:rgba(92,255,112,.05);">
      <div style="font-size:32px;margin-bottom:12px;">🤖</div>
      <h3 style="font-size:18px;font-weight:700;color:#f7fbff;font-family:'DM Serif Display',serif;margin-bottom:8px;">Análisis personalizado con IA</h3>

      <div class="ia-features">
        ${["Diagnóstico personalizado","Por qué este plan","Primer paso concreto","Mensaje directo"].map(f=>`<span class="ia-feature">${f}</span>`).join("")}
      </div>

      <button class="btn-primary" id="btn-generar-ia" style="width:100%;">Generar análisis IA →</button>
    </div>
  </div>`;

  return `<div class="fade">
    <div class="card ia-result-msg" style="border:1px solid rgba(92,255,112,.3);background:rgba(92,255,112,.08);margin-bottom:14px;">
      <div style="font-size:10px;color:#5cff70;font-weight:900;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;">💬 Para vos, ${PRE.nombre.split(" ")[0]}</div>
      <p style="font-size:15px;color:#f7fbff;line-height:1.75;font-style:italic;">"${iaResult.mensaje}"</p>
    </div>
    ${[["🔍","Diagnóstico",iaResult.diagnostico],["🎯","Por qué este plan",iaResult.plan]].map(([ic,t,txt])=>`
    <div class="card ia-section" style="margin-bottom:12px;">
      <div class="ia-section-header"><span class="ia-icon">${ic}</span><span class="ia-section-title">${t}</span></div>
      <p class="ia-text">${txt}</p>
    </div>`).join("")}
    ${iaResult.prioridades?.length?`<div class="card ia-section" style="margin-bottom:12px;">
      <div class="ia-section-header"><span class="ia-icon">📋</span><span class="ia-section-title">Acciones recomendadas</span></div>
      <div class="ia-priorities">
        ${iaResult.prioridades.map((p,i)=>`<div class="ia-priority"><div class="ia-p-num">${i+1}</div><p style="font-size:13px;color:#a9b4cc;line-height:1.6;">${p}</p></div>`).join("")}
      </div>
    </div>`:""}
    <div class="card ia-primer-paso" style="border:1px solid rgba(92,255,112,.3);background:rgba(92,255,112,.08);margin-bottom:14px;">
      <div class="ia-primer-lbl">Hacé esto esta semana</div>
      <div class="ia-primer-txt">${iaResult.primerPaso}</div>
    </div>
    <div style="text-align:right;"><button onclick="iaResult=null;renderTab();" style="background:none;border:none;font-size:11px;color:#a9b4cc;cursor:pointer;font-family:inherit;">Regenerar análisis</button></div>
  </div>`;
}
